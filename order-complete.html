<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GUGU. — 결제완료</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#F8F8F7;--white:#FFF;--border:#E8E8E8;--red:#EF4444;--red-light:#FEF2F2;--orange:#F97316;--green:#10B981;--green-light:#ECFDF5;--t1:#111;--t2:#6B7280;--t3:#9CA3AF;--r:16px}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans KR','Plus Jakarta Sans',sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column}a{text-decoration:none;color:inherit}
nav:not(.mob-bottom-nav){background:rgba(255,255,255,.88);border-bottom:1px solid var(--border);padding:0 24px}
.nav-inner{max-width:1120px;margin:0 auto;display:flex;align-items:center;height:60px}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;text-decoration:none;color:var(--t1)}.logo em{color:var(--red);font-style:normal}
.steps{display:flex;align-items:center;gap:0;margin-left:40px}.step{display:flex;align-items:center;gap:6px;font-size:12px}
.step-c{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.step.done .step-c{background:var(--green);color:#fff}.step.active .step-c{background:var(--red);color:#fff}
.step.done .step-l{color:var(--green)}.step.active .step-l{color:var(--t1);font-weight:600}
.step-line{width:32px;height:1px;background:var(--green);margin:0 6px}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.box{width:100%;max-width:560px}
.success-icon{width:72px;height:72px;border-radius:50%;background:var(--green-light);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.success-title{font-size:24px;font-weight:800;text-align:center;margin-bottom:6px}
.success-sub{font-size:14px;color:var(--t2);text-align:center;margin-bottom:28px}
.order-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.order-card-title{font-size:13px;color:var(--t2);margin-bottom:14px;font-weight:500}
.order-product{display:flex;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.order-img{width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,#FFF1F2,#FEE2E2);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.order-name{font-size:14px;font-weight:600;margin-bottom:4px}.order-opt{font-size:12px;color:var(--t2);margin-bottom:4px}.order-price{font-size:14px;font-weight:700;color:var(--red)}
.info-list{display:flex;flex-direction:column;gap:10px}
.info-item{display:flex;justify-content:space-between;font-size:13px}.info-item .k{color:var(--t2)}.info-item .v{font-weight:500}.info-item .v.green{color:var(--green);font-weight:700}
.track-bar{background:var(--bg);border-radius:12px;padding:16px;margin-top:16px}
.track-steps{display:flex;align-items:flex-start}
.t-step{flex:1;text-align:center;position:relative}
.t-step-dot{width:20px;height:20px;border-radius:50%;background:var(--border);margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:9px;position:relative;z-index:1}
.t-step.done .t-step-dot{background:var(--green);color:#fff}.t-step.current .t-step-dot{background:var(--orange);color:#fff;box-shadow:0 0 0 3px rgba(249,115,22,.2)}
.t-step-line{position:absolute;top:10px;left:50%;width:100%;height:1px;background:var(--border);z-index:0}.t-step.done .t-step-line{background:var(--green)}
.t-step:last-child .t-step-line{display:none}
.t-step-label{font-size:10px;color:var(--t3)}.t-step.done .t-step-label,.t-step.current .t-step-label{color:var(--t1)}
.btn-row{display:flex;gap:10px;margin-top:4px}
.btn-p{flex:1;padding:14px;border-radius:14px;border:none;background:var(--red);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(239,68,68,.2)}
.btn-sec{flex:1;padding:14px;border-radius:14px;border:1px solid var(--border);background:var(--white);color:var(--t1);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.mob-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);border-top:1px solid var(--border);z-index:500;justify-content:space-around;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.mbn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;font-size:10px;color:var(--t3);font-weight:600}.mbn-item:hover{color:var(--red)}.mbn-icon{font-size:20px;line-height:1}.mbn-label{font-size:10px}
@media(max-width:768px){body{padding-bottom:62px}.mob-bottom-nav{display:flex}.steps{display:none}nav:not(.mob-bottom-nav) .nav-inner{padding:0 16px}input,select,textarea{font-size:16px!important}}
</style></head><body>
<nav><div class="nav-inner"><a class="logo" href="index.html">GUGU<em>.</em></a>
<div class="steps"><div class="step done"><div class="step-c">✓</div><span class="step-l">장바구니</span></div><div class="step-line"></div><div class="step done"><div class="step-c">✓</div><span class="step-l">주문/결제</span></div><div class="step-line"></div><div class="step active"><div class="step-c">✓</div><span class="step-l">완료</span></div></div>
</div></nav>
<div class="main"><div class="box">
  <div class="success-icon">✓</div>
  <div class="success-title">결제가 완료됐어요!</div>
  <div class="success-sub">공구 마감 후 배송이 시작돼요. 마이페이지에서 배송 현황을 확인하세요.</div>
  <div class="order-card"><div class="order-card-title">주문 상품</div>
    <div class="order-product"><div class="order-img">🧴</div><div><div class="order-name">닥터자르트 시카페어 크림 50ml</div><div class="order-opt">지민뷰티 공구 · 50ml · 1개</div><div class="order-price">31,900원</div></div></div>
    <div class="info-list">
      <div class="info-item"><span class="k">주문번호</span><span class="v">GG-2026040301</span></div>
      <div class="info-item"><span class="k">결제 수단</span><span class="v">신용카드</span></div>
      <div class="info-item"><span class="k">결제 금액</span><span class="v green">31,900원</span></div>
      <div class="info-item"><span class="k">배송지</span><span class="v">서울특별시 강남구 테헤란로 152</span></div>
      <div class="info-item"><span class="k">예상 배송</span><span class="v">공구 마감 후 3~5일 이내</span></div>
    </div>
    <div class="track-bar"><div class="track-steps">
      <div class="t-step done"><div class="t-step-line"></div><div class="t-step-dot">✓</div><div class="t-step-label">주문완료</div></div>
      <div class="t-step current"><div class="t-step-line"></div><div class="t-step-dot">·</div><div class="t-step-label">공구진행</div></div>
      <div class="t-step"><div class="t-step-line"></div><div class="t-step-dot"></div><div class="t-step-label">배송준비</div></div>
      <div class="t-step"><div class="t-step-line"></div><div class="t-step-dot"></div><div class="t-step-label">배송중</div></div>
      <div class="t-step"><div class="t-step-line"></div><div class="t-step-dot"></div><div class="t-step-label">배송완료</div></div>
    </div></div>
  </div>
  <div class="btn-row" style="margin-bottom:28px">
    <button class="btn-sec" onclick="location.href='mypage.html'">주문내역 보기</button>
    <button class="btn-p" onclick="location.href='index.html'">계속 쇼핑하기</button>
  </div>
</div></div>
<nav class="mob-bottom-nav"><a class="mbn-item" href="index.html"><span class="mbn-icon">🏠</span><span class="mbn-label">홈</span></a><a class="mbn-item" href="category.html"><span class="mbn-icon">🔍</span><span class="mbn-label">탐색</span></a><a class="mbn-item" href="search.html"><span class="mbn-icon">⌕</span><span class="mbn-label">검색</span></a><a class="mbn-item" href="notifications.html"><span class="mbn-icon">🔔</span><span class="mbn-label">알림</span></a><a class="mbn-item" href="mypage.html"><span class="mbn-icon">👤</span><span class="mbn-label">마이</span></a></nav>
</body></html>
