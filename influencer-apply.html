<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GUGU. — 인플루언서 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0A0A;--s1:#111114;--s2:#181818;--b1:#242428;--r:#FF3B3B;--o:#FF8A00;--g:#22c55e;--bl:#6366f1;--t:#F2F2F5;--t2:#8a8a9a;--t3:#464650}
html,body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;font-size:14px;overflow-x:hidden;min-height:100vh}
body{padding-top:52px;padding-bottom:70px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid var(--b1)}
.nb{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:var(--t2)}
.nt{font-size:17px;font-weight:800;flex:1}
.bna{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.97);border-top:1px solid var(--b1);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:#464650;text-decoration:none;font-size:10px;font-weight:600}

.form-wrap{padding:16px}
.page-header{text-align:center;padding:20px 0 24px}
.ph-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,59,59,.1);border:1px solid rgba(255,59,59,.2);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:700;color:var(--r);margin-bottom:14px}
.ph-title{font-family:"Bebas Neue",sans-serif;font-size:36px;letter-spacing:2px;margin-bottom:8px;line-height:1}
.ph-title em{color:var(--r);font-style:normal}
.ph-sub{font-size:13px;color:var(--t2);line-height:1.6}
.bcard-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.bcard{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px;text-align:center}
.bc-n{font-size:18px;font-weight:900;color:var(--r);margin-bottom:3px}
.bc-l{font-size:10px;color:var(--t2)}
.form-section{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px;margin-bottom:12px}
.fs-title{font-size:14px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.fs-num{width:22px;height:22px;border-radius:50%;background:var(--r);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fg{margin-bottom:12px}
.fg:last-child{margin-bottom:0}
.fg-label{font-size:12px;color:var(--t2);font-weight:600;margin-bottom:5px}
.fg-input,.fg-select{width:100%;padding:12px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;color:var(--t);font-size:16px;font-family:inherit;outline:none}
.fg-input:focus{border-color:var(--r)}
.fg-input::placeholder{color:var(--t3)}
.cat-grid{display:flex;flex-wrap:wrap;gap:7px}
.cat-btn{padding:7px 13px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid var(--b1);background:none;color:var(--t2);cursor:pointer;font-family:inherit;transition:.15s}
.cat-btn.on{background:var(--r);border-color:var(--r);color:#fff}
.agree-list{display:flex;flex-direction:column;gap:10px}
.ag-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--t2)}
.ag-item input{accent-color:var(--r);width:16px;height:16px;margin-top:1px;flex-shrink:0}
.submit-btn{width:100%;padding:15px;border-radius:12px;background:var(--r);border:none;color:#fff;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:8px}
.submit-note{font-size:12px;color:var(--t3);text-align:center;margin-top:8px}

</style>
</head>
<body>

<div class="nav"><div class="nb" onclick="history.back()">←</div><div class="nt">인플루언서 신청</div></div>
<div class="form-wrap">
  <div class="page-header">
    <div class="ph-badge">✨ 파트너 모집 중</div>
    <div class="ph-title">제품만 골라오세요<br><em>나머지는 GUGU</em></div>
    <div class="ph-sub">입점 무료 · 3개월 수수료 0% · 이후 5%만</div>
  </div>
  <div class="bcard-row">
    <div class="bcard"><div class="bc-n">5%</div><div class="bc-l">수수료</div></div>
    <div class="bcard"><div class="bc-n">3개월</div><div class="bc-l">수수료 0%</div></div>
    <div class="bcard"><div class="bc-n">0원</div><div class="bc-l">입점비</div></div>
  </div>
  <div class="form-section">
    <div class="fs-title"><span class="fs-num">1</span>기본 정보</div>
    <div class="fg"><div class="fg-label">이름 *</div><input class="fg-input" type="text" placeholder="실명 입력"></div>
    <div class="fg"><div class="fg-label">활동 닉네임 *</div><input class="fg-input" type="text" placeholder="예: 지민뷰티"></div>
    <div class="fg"><div class="fg-label">이메일 *</div><input class="fg-input" type="email" placeholder="연락받을 이메일"></div>
    <div class="fg"><div class="fg-label">휴대폰 *</div><input class="fg-input" type="tel" placeholder="010-0000-0000"></div>
  </div>
  <div class="form-section">
    <div class="fs-title"><span class="fs-num">2</span>채널 정보</div>
    <div class="fg"><div class="fg-label">채널 URL *</div><input class="fg-input" type="url" placeholder="https://instagram.com/..."></div>
    <div class="fg"><div class="fg-label">팔로워/구독자 수 *</div>
      <select class="fg-select"><option value="">선택</option><option>1만~5만</option><option>5만~10만</option><option>10만~30만</option><option>30만~100만</option><option>100만 이상</option></select>
    </div>
  </div>
  <div class="form-section">
    <div class="fs-title"><span class="fs-num">3</span>카테고리</div>
    <div class="cat-grid">
      <button class="cat-btn on" onclick="this.classList.toggle('on')">💄 뷰티</button>
      <button class="cat-btn" onclick="this.classList.toggle('on')">👗 패션</button>
      <button class="cat-btn" onclick="this.classList.toggle('on')">🍎 푸드</button>
      <button class="cat-btn" onclick="this.classList.toggle('on')">🏠 라이프</button>
      <button class="cat-btn" onclick="this.classList.toggle('on')">💪 피트니스</button>
      <button class="cat-btn" onclick="this.classList.toggle('on')">👶 육아</button>
    </div>
  </div>
  <div class="form-section">
    <div class="fs-title"><span class="fs-num">4</span>약관 동의</div>
    <div class="agree-list">
      <label class="ag-item"><input type="checkbox" id="all" onchange="document.querySelectorAll('.ag-cb').forEach(c=>c.checked=this.checked)">[전체 동의]</label>
      <label class="ag-item"><input class="ag-cb" type="checkbox">[필수] 이용약관에 동의합니다</label>
      <label class="ag-item"><input class="ag-cb" type="checkbox">[필수] 개인정보처리방침에 동의합니다</label>
      <label class="ag-item"><input class="ag-cb" type="checkbox">[필수] 수수료 조건에 동의합니다</label>
    </div>
  </div>
  <button class="submit-btn" onclick="alert('신청 완료! 영업일 3일 내 이메일로 연락드릴게요 🎉');location.href='index.html'">파트너 신청하기 →</button>
  <div class="submit-note">심사 후 영업일 3일 이내 이메일로 결과 안내</div>
</div>
<nav class="bna">
  <a class="bi" href="index.html"><span style="font-size:20px">🏠</span>홈</a>
  <a class="bi" href="category.html"><span style="font-size:20px">🔍</span>탐색</a>
  <a class="bi" href="search.html"><span style="font-size:20px">⌕</span>검색</a>
  <a class="bi" href="notifications.html"><span style="font-size:20px">🔔</span>알림</a>
  <a class="bi" href="mypage.html"><span style="font-size:20px">👤</span>마이</a>
</nav>
</body>
</html>
