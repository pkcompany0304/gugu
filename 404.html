<title>GUGU. — 페이지를 찾을 수 없어요</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0A0A;--s1:#111114;--s2:#181818;--b1:#242428;--r:#FF3B3B;--o:#FF8A00;--g:#22c55e;--t:#F2F2F5;--t2:#8a8a9a;--t3:#464650}
html,body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;font-size:14px;overflow-x:hidden}
body{padding-top:52px;padding-bottom:70px}}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid var(--b1)}

.err-wrap{min-height:calc(100vh - 52px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.err-icon{font-size:72px;margin-bottom:20px;opacity:.6}
.err-code{font-family:"Bebas Neue",sans-serif;font-size:80px;letter-spacing:4px;color:var(--r);line-height:1;margin-bottom:10px}
.err-title{font-size:20px;font-weight:800;margin-bottom:8px}
.err-sub{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:28px}
.err-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
.err-btn{padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;border:none}
.err-btn.primary{background:var(--r);color:#fff}
.err-btn.secondary{background:var(--s1);border:1px solid var(--b1);color:var(--t2)}

</style>
</head>

<div class="nav">

</div>
<div class="err-wrap">

  <div class="err-sub">요청하신 페이지가 존재하지 않거나<br>이동됐을 수 있어요</div>
  <div class="err-btns">
    <button class="err-btn primary" onclick="location.href='index.html'">🏠 홈으로 돌아가기</button>
