<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUGU. — 페이지를 찾을 수 없어요</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A0A;--surface:#141414;--surface2:#1C1C1C;--border:#2A2A2A;--accent:#FF3B3B;--accent2:#FF8A00;--text:#F5F5F5;--muted:#888}
body {background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;padding-top:54px}
nav{background:rgba(10,10,10,0.97);border-bottom:1px solid var(--border);padding:0 32px}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:56px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;text-decoration:none;color:var(--text)}
.logo span{color:var(--accent)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.box{text-align:center;max-width:480px}
.num{font-family:'Bebas Neue',sans-serif;font-size:120px;letter-spacing:4px;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.title{font-size:22px;font-weight:700;margin-bottom:10px}
.sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:32px}
.btn-row{display:flex;gap:10px;justify-content:center;margin-bottom:40px}
.btn-primary{padding:12px 28px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-secondary{padding:12px 28px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--text);font-size:14px;cursor:pointer;font-family:inherit}
.btn-secondary:hover{background:var(--surface2)}
.rec-title{font-size:13px;color:var(--muted);margin-bottom:14px}
.quick-links{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.quick-link{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;transition:.2s}
.quick-link:hover{border-color:var(--muted);color:var(--text)}


/* ══════════════════════════════════════
   MOBILE RESPONSIVE — 404.html
══════════════════════════════════════ */

@media (max-width: 768px) {
  .error-wrap { padding:60px 20px !important; }
  .error-num { font-size:100px !important; }
  .error-title { font-size:22px !important; }
  .btn-group { flex-direction:column !important; gap:8px !important; }
  .btn-group a,.btn-group button { width:100% !important; }
}


/* ══════ 공통 모바일 요소 ══════ */
@media (max-width: 768px) {
  /* 네비 공통 */
  .mob-menu-btn { display:flex !important; }
  .mob-search-bar { display:flex !important; }
  /* 하단 탭바 */
  .mob-bottom-nav { display:flex !important; }
  body { padding-bottom:60px; }
}

/* 햄버거 드로어 메뉴 */
.mob-menu-btn { display:none; width:36px; height:36px; border-radius:8px; background:var(--s2,#171719); border:1px solid var(--b1,#242428); align-items:center; justify-content:center; cursor:pointer; font-size:18px; color:var(--t2,#8a8a9a); flex-shrink:0; }
.mob-drawer{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.82);align-items:flex-end;}
.mob-drawer.open{display:flex;}
.mob-drawer-inner { background:var(--s1,#111114); width:100%; border-radius:20px 20px 0 0; padding:20px 20px 40px; transform:translateY(100%); transition:transform .3s ease; }
.mob-drawer.open .mob-drawer-inner { transform:translateY(0); }
.mob-drawer-handle { width:36px; height:4px; background:var(--b2,#2e2e34); border-radius:2px; margin:0 auto 20px; }
.mob-drawer-cats { display:flex; flex-direction:column; gap:6px; margin-bottom:20px; }
.mob-drawer-cats a { padding:12px 16px; border-radius:10px; font-size:15px; font-weight:600; color:var(--t,#F2F2F5); text-decoration:none; border:1px solid var(--b1,#242428); background:var(--s2,#171719); display:flex; align-items:center; gap:10px; }
.mob-drawer-btns { display:flex; gap:8px; }
.mob-drawer-btns button { flex:1; padding:12px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
.mob-search-bar { display:none; align-items:center; gap:8px; background:var(--s2,#171719); border:1px solid var(--b1,#242428); border-radius:10px; padding:10px 14px; margin:6px 16px 0; }
.mob-search-bar input { background:none; border:none; outline:none; color:var(--t,#F2F2F5); font-size:14px; font-family:inherit; width:100%; }
@media (max-width: 768px) {
  .mob-menu-btn { display:flex !important; }
  .mob-search-bar { display:flex !important; }
}

</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="logo" href="index.html">GUGU<span>.</span></a>
  </div>
</nav>
<div class="main">
  <div class="box">
    <div class="num">404</div>
    <div class="title">페이지를 찾을 수 없어요</div>
    <div class="sub">요청하신 페이지가 삭제됐거나 주소가 변경됐어요.<br>공구가 마감됐을 수도 있어요.</div>
    <div class="btn-row">
      <button class="btn-primary" onclick="location.href='index.html'">홈으로 돌아가기</button>
      <button class="btn-secondary" onclick="history.back()">이전 페이지</button>
    </div>
    <div class="rec-title">이런 페이지는 어떠세요?</div>
    <div class="quick-links">
      <button class="quick-link" onclick="location.href='index.html'">🔥 진행중인 공구</button>
      <button class="quick-link" onclick="location.href='category.html'">💄 뷰티 공구</button>
      <button class="quick-link" onclick="location.href='search.html'">🔍 검색하기</button>
      <button class="quick-link" onclick="location.href='help.html'">❓ 고객센터</button>
    </div>
  </div>
</div>

<!-- 모바일 하단 네비게이션 -->
<nav class="mob-bottom-nav" id="mobBottomNav">
  <a class="mbn-item" href="index.html">
    <span class="mbn-icon">🏠</span>
    <span class="mbn-label">홈</span>
  </a>
  <a class="mbn-item" href="category.html">
    <span class="mbn-icon">🔍</span>
    <span class="mbn-label">탐색</span>
  </a>
  <a class="mbn-item" href="search.html">
    <span class="mbn-icon">⌕</span>
    <span class="mbn-label">검색</span>
  </a>
  <a class="mbn-item" href="notifications.html">
    <span class="mbn-icon" style="position:relative">🔔<span class="mbn-badge"></span></span>
    <span class="mbn-label">알림</span>
  </a>
  <a class="mbn-item" href="mypage.html">
    <span class="mbn-icon">👤</span>
    <span class="mbn-label">마이</span>
  </a>
</nav>
<style>
.mob-bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,10,10,.97);
  
  border-top: 1px solid var(--b1, #242428);
  z-index: 300;
  padding: 0 8px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.mob-bottom-nav .mbn-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  padding: 10px 4px;
  text-decoration: none; color: var(--t2, #8a8a9a);
  transition: .15s;
}
.mob-bottom-nav .mbn-item:hover,
.mob-bottom-nav .mbn-item.active { color: var(--r, #FF3B3B); }
.mbn-icon { font-size: 18px; position: relative; }
.mbn-label { font-size: 10px; font-weight: 600; white-space: nowrap; }
.mbn-badge {
  position: absolute; top: -3px; right: -5px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--r, #FF3B3B);
  border: 1.5px solid var(--bg, #0A0A0A);
}
@media (max-width: 768px) {
  .mob-bottom-nav { display: flex !important; }
  
}
</style>
</body>
</html>
