<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GUGU. — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0A0A;--s1:#111114;--s2:#181818;--b1:#242428;--b2:#2e2e34;--r:#FF3B3B;--o:#FF8A00;--t:#F2F2F5;--t2:#8a8a9a;--t3:#464650}
html,body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden}

.login-wrap{min-height:100vh;display:flex;flex-direction:column;padding:0 24px;padding-top:env(safe-area-inset-top,0)}
.login-header{display:flex;align-items:center;height:56px}
.lh-back{font-size:22px;cursor:pointer;color:var(--t2);padding-right:12px}
.login-brand{flex:1;text-align:center;padding-bottom:24px;padding-top:32px}
.lb-logo{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:4px;margin-bottom:6px}
.lb-logo em{color:var(--r);font-style:normal}
.lb-sub{font-size:13px;color:var(--t2)}

/* 탭 */
.login-tabs{display:flex;background:var(--s1);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.lt{flex:1;padding:10px;border-radius:9px;text-align:center;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;color:var(--t2);border:none;background:none;font-family:inherit}
.lt.on{background:var(--r);color:#fff}

/* 폼 */
.form-group{margin-bottom:14px}
.fg-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px}
.fg-input{width:100%;padding:14px 16px;background:var(--s1);border:1px solid var(--b1);border-radius:12px;color:var(--t);font-size:16px;font-family:inherit;outline:none;transition:.15s}
.fg-input:focus{border-color:var(--r)}
.fg-input::placeholder{color:var(--t3)}
.fg-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.fg-link{font-size:12px;color:var(--t3);cursor:pointer}
.fg-check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);cursor:pointer}
.fg-check input{accent-color:var(--r);width:16px;height:16px}

/* 버튼 */
.btn-login{width:100%;padding:15px;border-radius:12px;background:var(--r);border:none;color:#fff;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:8px;letter-spacing:-.3px}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--t3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b1)}

/* 소셜 */
.social-btns{display:flex;flex-direction:column;gap:10px}
.social-btn{width:100%;padding:14px;border-radius:12px;border:1px solid var(--b1);background:var(--s1);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--t)}
.sb-kakao{background:#FEE500;border-color:#FEE500;color:#3C1E1E}
.sb-naver{background:#03C75A;border-color:#03C75A;color:#fff}
.sb-google{background:var(--s1);color:var(--t)}

/* 하단 링크 */
.login-footer{margin-top:24px;text-align:center;font-size:13px;color:var(--t2)}
.lf-link{color:var(--r);font-weight:700;cursor:pointer}
.login-terms{padding:20px 0;text-align:center;font-size:11px;color:var(--t3);line-height:1.7}
.login-terms a{color:var(--t3);text-decoration:underline}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-header">
    <div class="lh-back" onclick="history.back()">←</div>
  </div>

  <div class="login-brand">
    <div class="lb-logo">GUGU<em>.</em></div>
    <div class="lb-sub">인플루언서 공구 전용 플랫폼</div>
  </div>

  <div class="login-tabs">
    <button class="lt on" id="tab-login" onclick="setTab('login')">로그인</button>
    <button class="lt" id="tab-join" onclick="setTab('join')">회원가입</button>
  </div>

  <!-- 로그인 폼 -->
  <div id="form-login">
    <div class="form-group">
      <div class="fg-label">이메일</div>
      <input class="fg-input" type="email" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <div class="fg-row">
        <div class="fg-label">비밀번호</div>
        <div class="fg-link">비밀번호 찾기</div>
      </div>
      <input class="fg-input" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <label class="fg-check"><input type="checkbox" checked> 로그인 상태 유지</label>
    <button class="btn-login" onclick="location.href='index.html'">로그인</button>
    <div class="divider">또는</div>
    <div class="social-btns">
      <button class="social-btn sb-kakao">🟡 카카오로 시작하기</button>
      <button class="social-btn sb-naver">🟢 네이버로 시작하기</button>
      <button class="social-btn sb-google">🔵 Google로 시작하기</button>
    </div>
    <div class="login-footer">계정이 없으신가요? <span class="lf-link" onclick="setTab('join')">회원가입</span></div>
  </div>

  <!-- 회원가입 폼 -->
  <div id="form-join" style="display:none">
    <div class="form-group">
      <div class="fg-label">이메일</div>
      <input class="fg-input" type="email" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <div class="fg-label">닉네임</div>
      <input class="fg-input" type="text" placeholder="사용할 닉네임">
    </div>
    <div class="form-group">
      <div class="fg-label">비밀번호</div>
      <input class="fg-input" type="password" placeholder="8자 이상" autocomplete="new-password">
    </div>
    <div class="form-group">
      <div class="fg-label">비밀번호 확인</div>
      <input class="fg-input" type="password" placeholder="비밀번호 재입력" autocomplete="new-password">
    </div>
    <button class="btn-login" onclick="location.href='index.html'">회원가입</button>
    <div class="login-footer">이미 계정이 있으신가요? <span class="lf-link" onclick="setTab('login')">로그인</span></div>
  </div>

  <div class="login-terms">
    가입 시 <a href="terms.html">이용약관</a> 및 <a href="privacy.html">개인정보처리방침</a>에 동의합니다
  </div>
</div>

<script>
function setTab(t){
  document.getElementById('tab-login').classList.toggle('on',t==='login');
  document.getElementById('tab-join').classList.toggle('on',t==='join');
  document.getElementById('form-login').style.display=t==='login'?'block':'none';
  document.getElementById('form-join').style.display=t==='join'?'block':'none';
}
</script>

<nav style="position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(10,10,10,.97);border-top:1px solid #242428;display:flex;padding-bottom:env(safe-area-inset-bottom,0px)">
  <a style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:#464650;text-decoration:none;font-size:10px;font-weight:600;white-space:nowrap" href="index.html"><span style="font-size:20px;line-height:1">🏠</span>홈</a>
  <a style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:#464650;text-decoration:none;font-size:10px;font-weight:600;white-space:nowrap" href="category.html"><span style="font-size:20px;line-height:1">🔍</span>탐색</a>
  <a style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:#464650;text-decoration:none;font-size:10px;font-weight:600;white-space:nowrap" href="search.html"><span style="font-size:20px;line-height:1">⌕</span>검색</a>
  <a style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:#464650;text-decoration:none;font-size:10px;font-weight:600;white-space:nowrap" href="notifications.html"><span style="font-size:20px;line-height:1">🔔</span>알림</a>
  <a style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:#464650;text-decoration:none;font-size:10px;font-weight:600;white-space:nowrap" href="mypage.html"><span style="font-size:20px;line-height:1">👤</span>마이</a>
</nav>
</body>
</html>
