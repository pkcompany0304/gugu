<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GUGU. — 인플루언서 프로필</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0A0A;--s1:#111114;--s2:#181818;--b1:#242428;--r:#FF3B3B;--o:#FF8A00;--g:#22c55e;--bl:#6366f1;--t:#F2F2F5;--t2:#8a8a9a;--t3:#464650}
html,body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;font-size:14px;overflow-x:hidden;min-height:100vh}
body{padding-top:52px;padding-bottom:70px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid var(--b1)}
.nb{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:var(--t2)}
.nt{font-size:17px;font-weight:800;flex:1}
.bna{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.97);border-top:1px solid var(--b1);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:#464650;text-decoration:none;font-size:10px;font-weight:600}

.profile-hero{background:linear-gradient(170deg,#160303,#0d0d0d);padding:28px 16px 20px}
.ph-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.ph-av{width:64px;height:64px;border-radius:50%;background:#e83e8c;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;border:3px solid var(--r);flex-shrink:0}
.ph-info h1{font-size:20px;font-weight:900}
.ph-info p{font-size:12px;color:var(--t2);margin-top:3px}
.ph-verified{display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--g);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-top:4px}
.ph-btns{display:flex;gap:8px}
.ph-btn{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.ph-btn.follow{background:var(--r);border:none;color:#fff}
.ph-btn.share{background:none;border:1px solid var(--b1);color:var(--t2)}
.stats-bar{display:flex;border-bottom:1px solid var(--b1)}
.sb-item{flex:1;padding:14px 0;text-align:center;border-right:1px solid var(--b1)}
.sb-item:last-child{border-right:none}
.sb-n{font-size:18px;font-weight:800}.sb-l{font-size:10px;color:var(--t2)}
.tags{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px;border-bottom:1px solid var(--b1)}
.tag{padding:5px 12px;border-radius:99px;background:rgba(255,59,59,.07);border:1px solid rgba(255,59,59,.15);font-size:12px;color:var(--r);font-weight:600}
.sec-title{font-size:15px;font-weight:800;padding:14px 16px 10px}
.gugu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px}
.gc{background:var(--s1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;cursor:pointer}
.gc-img{height:130px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:44px}
.gc-body{padding:10px}
.gc-name{font-size:12px;font-weight:700;margin-bottom:5px;line-height:1.3}
.gc-pr{display:flex;align-items:center;gap:5px}
.gc-sale{font-size:14px;font-weight:800}.gc-disc{font-size:10px;color:var(--r);font-weight:700}

</style>
</head>
<body>

<div class="nav"><div class="nb" onclick="history.back()">←</div><div class="nt">인플루언서</div></div>
<div class="profile-hero">
  <div class="ph-top">
    <div class="ph-av">지</div>
    <div class="ph-info">
      <h1>지민뷰티</h1>
      <p>@jiminbeauty</p>
      <div class="ph-verified">✓ GUGU 인증</div>
    </div>
  </div>
  <div class="ph-btns">
    <button class="ph-btn follow" onclick="this.textContent=this.textContent==='팔로우'?'팔로잉 ✓':'팔로우';this.style.background=this.textContent.includes('✓')?'var(--g)':'var(--r)'">팔로우</button>
    <button class="ph-btn share">공유</button>
  </div>
</div>
<div class="stats-bar">
  <div class="sb-item"><div class="sb-n">89.2만</div><div class="sb-l">팔로워</div></div>
  <div class="sb-item"><div class="sb-n">247</div><div class="sb-l">공구 진행</div></div>
  <div class="sb-item"><div class="sb-n">4.9</div><div class="sb-l">평균 평점</div></div>
  <div class="sb-item"><div class="sb-n">12.4만</div><div class="sb-l">누적 구매자</div></div>
</div>
<div class="tags">
  <span class="tag">#뷰티</span><span class="tag">#스킨케어</span><span class="tag">#메이크업</span><span class="tag">#민감성피부</span>
</div>
<div class="sec-title">진행 중인 공구</div>
<div class="gugu-grid">
  <div class="gc" onclick="location.href='product-detail.html'">
    <div class="gc-img" style="background:linear-gradient(135deg,#140505,#200a0a)">🧴</div>
    <div class="gc-body"><div class="gc-name">레티날 0.1% 나이트 세럼 30ml</div><div class="gc-pr"><span class="gc-sale">40,800원</span><span class="gc-disc">-40%</span></div></div>
  </div>
  <div class="gc" onclick="location.href='product-detail.html'">
    <div class="gc-img" style="background:linear-gradient(135deg,#050514,#0a0a20)">💄</div>
    <div class="gc-body"><div class="gc-name">롬앤 쥬시래스팅틴트 전색상</div><div class="gc-pr"><span class="gc-sale">11,200원</span><span class="gc-disc">-38%</span></div></div>
  </div>
</div>
<nav class="bna">
  <a class="bi" href="index.html"><span style="font-size:20px">🏠</span>홈</a>
  <a class="bi" href="category.html"><span style="font-size:20px">🔍</span>탐색</a>
  <a class="bi" href="search.html"><span style="font-size:20px">⌕</span>검색</a>
  <a class="bi" href="notifications.html"><span style="font-size:20px">🔔</span>알림</a>
  <a class="bi" href="mypage.html"><span style="font-size:20px">👤</span>마이</a>
</nav>
</body>
</html>
