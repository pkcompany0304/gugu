<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUGU. — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0A0A;--s1:#111114;--s2:#171719;--s3:#1e1e22;
  --b1:#242428;--b2:#2e2e34;
  --r:#FF3B3B;--o:#FF8A00;--g:#22c55e;--bl:#6366f1;
  --t:#F2F2F5;--t2:#8a8a9a;--t3:#464650;
}
body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;font-size:14px;min-height:100vh}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
/* 사이드바 */
.sidebar{background:var(--s1);border-right:1px solid var(--b1);padding:20px 0;position:fixed;top:0;bottom:0;width:220px;overflow-y:auto}
.sb-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;padding:0 20px 20px;border-bottom:1px solid var(--b1);margin-bottom:16px}
.sb-logo em{color:var(--r);font-style:normal}
.sb-logo small{display:block;font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--t2);letter-spacing:0;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--t2);cursor:pointer;transition:.15s;border-left:2px solid transparent}
.nav-item:hover{color:var(--t);background:var(--s2)}
.nav-item.active{color:var(--t);background:var(--s2);border-left-color:var(--r)}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
/* 메인 */
.main{margin-left:220px;padding:28px}
.page-title{font-size:20px;font-weight:800;margin-bottom:24px;letter-spacing:-.3px}
/* KPI 카드 */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px}
.kpi-label{font-size:11px;color:var(--t2);margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:800;letter-spacing:-.5px}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:4px}
/* 테이블 */
.table-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:24px}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--b1)}
.table-title{font-size:14px;font-weight:700}
.table-actions{display:flex;gap:8px}
.btn-sm{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--b1);background:none;color:var(--t2);transition:.15s}
.btn-sm:hover{color:var(--t);border-color:var(--b2)}
.btn-r{background:var(--r);border-color:var(--r);color:#fff}
.btn-g{background:var(--g);border-color:var(--g);color:#fff}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:11px;color:var(--t2);font-weight:600;border-bottom:1px solid var(--b1);white-space:nowrap}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.badge-paid{background:rgba(34,197,94,.1);color:var(--g);border:1px solid rgba(34,197,94,.2)}
.badge-pending{background:rgba(255,138,0,.1);color:var(--o);border:1px solid rgba(255,138,0,.2)}
.badge-preparing{background:rgba(99,102,241,.1);color:var(--bl);border:1px solid rgba(99,102,241,.2)}
.badge-shipped{background:rgba(100,200,255,.1);color:#64c8ff;border:1px solid rgba(100,200,255,.2)}
.badge-delivered{background:rgba(34,197,94,.15);color:var(--g)}
.badge-cancelled{background:rgba(255,255,255,.06);color:var(--t2)}
/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:24px;width:480px;max-width:95vw}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;color:var(--t2);margin-bottom:5px;display:block}
.form-input{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t);font-size:13px;font-family:inherit;outline:none}
.form-select{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t);font-size:13px;font-family:inherit;outline:none;cursor:pointer}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
/* 탭 */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--b1);margin-bottom:20px}
.tab{padding:9px 16px;font-size:13px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap;transition:.15s}
.tab.active{color:var(--t);border-bottom-color:var(--r);font-weight:600}
/* 필터 */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-select{padding:6px 10px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;color:var(--t);font-size:12px;font-family:inherit;outline:none}
.search-input{padding:6px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;color:var(--t);font-size:12px;font-family:inherit;outline:none;width:200px}
.search-input::placeholder{color:var(--t3)}
</style>
</head>
<body>
<div class="layout">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sb-logo">GUGU<em>.</em><small>관리자 패널</small></div>
    <div class="nav-item active" onclick="showTab('dashboard')" id="nav-dashboard"><span class="icon">📊</span>대시보드</div>
    <div class="nav-item" onclick="showTab('orders')" id="nav-orders"><span class="icon">📦</span>주문 관리</div>
    <div class="nav-item" onclick="showTab('influencers')" id="nav-influencers"><span class="icon">👑</span>인플루언서 신청</div>
    <div class="nav-item" onclick="showTab('gugus')" id="nav-gugus"><span class="icon">🛍️</span>공구 현황</div>
    <div class="nav-item" onclick="showTab('settlements')" id="nav-settlements"><span class="icon">💰</span>정산 관리</div>
    <div style="border-top:1px solid var(--b1);margin:16px 0 8px"></div>
    <div class="nav-item" onclick="location.href='index.html'"><span class="icon">🌐</span>사이트 보기</div>
    <div class="nav-item" onclick="sb.auth.signOut().then(()=>location.href='login.html')"><span class="icon">🚪</span>로그아웃</div>
  </aside>

  <!-- 메인 -->
  <main class="main">

    <!-- 대시보드 -->
    <div id="tab-dashboard">
      <div class="page-title">대시보드</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-label">오늘 매출</div><div class="kpi-value" id="kpiToday">-</div><div class="kpi-sub">전일 대비</div></div>
        <div class="kpi"><div class="kpi-label">이번 달 매출</div><div class="kpi-value" id="kpiMonth">-</div><div class="kpi-sub">누적</div></div>
        <div class="kpi"><div class="kpi-label">미처리 주문</div><div class="kpi-value" id="kpiPendingShip" style="color:var(--o)">-</div><div class="kpi-sub">발송 대기</div></div>
        <div class="kpi"><div class="kpi-label">인플루언서 신청</div><div class="kpi-value" id="kpiPendingApp" style="color:var(--r)">-</div><div class="kpi-sub">검토 대기</div></div>
      </div>
    </div>

    <!-- 주문 관리 -->
    <div id="tab-orders" style="display:none">
      <div class="page-title">주문 관리</div>
      <div class="filter-row">
        <select class="filter-select" id="orderStatusFilter" onchange="loadOrders()">
          <option value="">전체 상태</option>
          <option value="paid">결제완료</option>
          <option value="preparing">준비중</option>
          <option value="shipped">배송중</option>
          <option value="delivered">배송완료</option>
          <option value="cancelled">취소</option>
        </select>
        <input class="search-input" type="text" id="orderSearch" placeholder="주문자/상품명 검색" oninput="filterOrdersTable()">
        <button class="btn-sm" onclick="loadOrders()">🔄 새로고침</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>주문번호</th><th>주문자</th><th>상품</th><th>금액</th>
            <th>상태</th><th>주문일</th><th>관리</th>
          </tr></thead>
          <tbody id="ordersTable"><tr><td colspan="7" style="text-align:center;color:var(--t2);padding:32px">로딩 중...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- 인플루언서 신청 -->
    <div id="tab-influencers" style="display:none">
      <div class="page-title">인플루언서 신청 검토</div>
      <div class="tabs">
        <button class="tab active" onclick="loadApplications('pending',this)">대기중</button>
        <button class="tab" onclick="loadApplications('approved',this)">승인됨</button>
        <button class="tab" onclick="loadApplications('rejected',this)">거절됨</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>신청자</th><th>채널명</th><th>채널유형</th><th>팔로워</th>
            <th>카테고리</th><th>신청일</th><th>관리</th>
          </tr></thead>
          <tbody id="appsTable"><tr><td colspan="7" style="text-align:center;color:var(--t2);padding:32px">로딩 중...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- 공구 현황 -->
    <div id="tab-gugus" style="display:none">
      <div class="page-title">공구 현황</div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>공구명</th><th>인플루언서</th><th>카테고리</th>
            <th>진행률</th><th>금액</th><th>마감일</th><th>상태</th>
          </tr></thead>
          <tbody id="gugusTable"><tr><td colspan="7" style="text-align:center;color:var(--t2);padding:32px">로딩 중...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- 정산 관리 -->
    <div id="tab-settlements" style="display:none">
      <div class="page-title">정산 관리</div>
      <div style="color:var(--t2);padding:32px 0">정산 기능은 인플루언서 계정이 생긴 후 운영됩니다.</div>
    </div>

  </main>
</div>

<!-- 주문 상태 변경 모달 -->
<div class="modal-bg" id="orderModal">
  <div class="modal">
    <div class="modal-title">주문 처리</div>
    <input type="hidden" id="editOrderId">
    <div class="form-row"><label class="form-label">주문 상태</label>
      <select class="form-select" id="editStatus">
        <option value="paid">결제완료</option>
        <option value="preparing">준비중</option>
        <option value="shipped">배송중</option>
        <option value="delivered">배송완료</option>
        <option value="cancelled">취소</option>
        <option value="refunded">환불</option>
      </select>
    </div>
    <div class="form-row"><label class="form-label">택배사</label>
      <select class="form-select" id="editCarrier">
        <option value="">선택</option>
        <option>CJ대한통운</option><option>한진택배</option>
        <option>우체국택배</option><option>로젠택배</option><option>롯데택배</option>
      </select>
    </div>
    <div class="form-row"><label class="form-label">송장번호</label>
      <input class="form-input" type="text" id="editTracking" placeholder="1234567890123">
    </div>
    <div class="form-row"><label class="form-label">관리자 메모</label>
      <input class="form-input" type="text" id="editNote" placeholder="내부용 메모">
    </div>
    <div class="modal-btns">
      <button class="btn-sm" onclick="document.getElementById('orderModal').classList.remove('open')">취소</button>
      <button class="btn-sm btn-r" onclick="saveOrder()">저장</button>
    </div>
  </div>
</div>

<!-- 신청 처리 모달 -->
<div class="modal-bg" id="appModal">
  <div class="modal">
    <div class="modal-title">신청 처리</div>
    <input type="hidden" id="editAppId">
    <div id="appDetail" style="background:var(--s2);border-radius:8px;padding:14px;margin-bottom:16px;font-size:13px;color:var(--t2);line-height:1.8"></div>
    <div class="form-row"><label class="form-label">거절 사유 (거절 시 작성)</label>
      <input class="form-input" type="text" id="rejectReason" placeholder="예: 팔로워 기준 미달">
    </div>
    <div class="modal-btns">
      <button class="btn-sm" onclick="document.getElementById('appModal').classList.remove('open')">취소</button>
      <button class="btn-sm" style="border-color:var(--r);color:var(--r)" onclick="handleApp('reject')">거절</button>
      <button class="btn-sm btn-g" onclick="handleApp('approve')">승인</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
let _token = '';
let _allOrders = [];

(async function init() {
  const u = await getCurrentUser();
  if (!u || u.profile?.role !== 'admin') {
    alert('관리자만 접근 가능합니다');
    location.href = 'index.html';
    return;
  }
  _token = (await sb.auth.getSession()).data.session?.access_token || '';
  loadDashboard();
})();

// ── 탭 전환 ──────────────────────────────────────────────
function showTab(name) {
  ['dashboard','orders','influencers','gugus','settlements'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name ? '' : 'none';
    document.getElementById('nav-'+t)?.classList.toggle('active', t===name);
  });
  if (name==='orders')      loadOrders();
  if (name==='influencers') loadApplications('pending');
  if (name==='gugus')       loadGuguList();
}

// ── 대시보드 ─────────────────────────────────────────────
async function loadDashboard() {
  const resp = await api('GET', '/api/admin/orders?stats=1');
  if (!resp.ok) return;
  const d = resp.data;
  document.getElementById('kpiToday').textContent     = `${(d.today_revenue||0).toLocaleString()}원`;
  document.getElementById('kpiMonth').textContent     = `${(d.month_revenue||0).toLocaleString()}원`;
  document.getElementById('kpiPendingShip').textContent = d.pending_shipment || 0;
  document.getElementById('kpiPendingApp').textContent  = d.pending_applications || 0;
}

// ── 주문 목록 ─────────────────────────────────────────────
async function loadOrders() {
  const status = document.getElementById('orderStatusFilter').value;
  const url = '/api/admin/orders' + (status ? `?status=${status}` : '');
  const resp = await api('GET', url);
  if (!resp.ok) return;
  _allOrders = resp.data;
  filterOrdersTable();
}

function filterOrdersTable() {
  const q = (document.getElementById('orderSearch')?.value || '').toLowerCase();
  const filtered = q
    ? _allOrders.filter(o =>
        (o.gugus?.title||'').toLowerCase().includes(q) ||
        (o.profiles?.name||'').toLowerCase().includes(q) ||
        (o.toss_order_id||'').toLowerCase().includes(q)
      )
    : _allOrders;

  const tbody = document.getElementById('ordersTable');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--t2);padding:32px">주문이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(o => `
    <tr>
      <td style="font-family:monospace;font-size:11px">${(o.toss_order_id||o.id||'').slice(0,18)}</td>
      <td>${o.profiles?.name||'-'}<br><span style="font-size:11px;color:var(--t2)">${o.profiles?.email||''}</span></td>
      <td>${o.gugus?.emoji||'🛍️'} ${(o.gugus?.title||'-').slice(0,24)}<br><span style="font-size:11px;color:var(--t2)">${o.quantity}개 · ${o.gugus?.profiles?.channel_name||''}</span></td>
      <td style="font-weight:700">${(o.total_amount||0).toLocaleString()}원</td>
      <td><span class="badge badge-${o.status}">${statusLabel(o.status)}</span>${o.tracking_number?`<br><span style="font-size:10px;color:var(--t2)">${o.shipping_carrier||''} ${o.tracking_number}</span>`:''}</td>
      <td style="font-size:11px;color:var(--t2)">${o.created_at?.slice(0,10)||'-'}</td>
      <td><button class="btn-sm" onclick="openOrderModal(${JSON.stringify(o).replace(/"/g,'&quot;')})">처리</button></td>
    </tr>`).join('');
}

function statusLabel(s) {
  return {pending:'결제전',paid:'결제완료',preparing:'준비중',shipped:'배송중',delivered:'배송완료',cancelled:'취소',refunded:'환불'}[s]||s;
}

function openOrderModal(o) {
  document.getElementById('editOrderId').value  = o.id;
  document.getElementById('editStatus').value   = o.status;
  document.getElementById('editCarrier').value  = o.shipping_carrier||'';
  document.getElementById('editTracking').value = o.tracking_number||'';
  document.getElementById('editNote').value     = o.admin_note||'';
  document.getElementById('orderModal').classList.add('open');
}

async function saveOrder() {
  const body = {
    order_id:         document.getElementById('editOrderId').value,
    status:           document.getElementById('editStatus').value,
    shipping_carrier: document.getElementById('editCarrier').value,
    tracking_number:  document.getElementById('editTracking').value,
    admin_note:       document.getElementById('editNote').value,
  };
  const resp = await api('PUT', '/api/admin/orders', body);
  if (resp.ok) {
    document.getElementById('orderModal').classList.remove('open');
    loadOrders();
  } else {
    alert(resp.error||'저장 실패');
  }
}

// ── 인플루언서 신청 ───────────────────────────────────────
async function loadApplications(status, tabEl) {
  if (tabEl) {
    document.querySelectorAll('#tab-influencers .tab').forEach(t=>t.classList.remove('active'));
    tabEl.classList.add('active');
  }
  const resp = await api('GET', `/api/admin/influencers?status=${status}`);
  if (!resp.ok) return;
  const tbody = document.getElementById('appsTable');
  const apps  = resp.data;
  if (!apps.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--t2);padding:32px">신청이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = apps.map(a => `
    <tr>
      <td>${a.profiles?.name||'-'}<br><span style="font-size:11px;color:var(--t2)">${a.profiles?.email||''}</span></td>
      <td><a href="${a.channel_url||'#'}" target="_blank" style="color:var(--bl)">${a.channel_name}</a></td>
      <td>${a.channel_type||'-'}</td>
      <td>${(a.follower_count||0).toLocaleString()}</td>
      <td>${a.category||'-'}</td>
      <td style="font-size:11px;color:var(--t2)">${a.created_at?.slice(0,10)||'-'}</td>
      <td>${a.status==='pending'?`<button class="btn-sm" onclick='openAppModal(${JSON.stringify(a).replace(/'/g,"&#39;")})'>검토</button>`:`<span style="color:var(--t2)">${a.status==='approved'?'승인됨':'거절됨'}</span>`}</td>
    </tr>`).join('');
}

function openAppModal(a) {
  document.getElementById('editAppId').value = a.id;
  document.getElementById('rejectReason').value = '';
  document.getElementById('appDetail').innerHTML = `
    <strong>${a.channel_name}</strong> (${a.channel_type})<br>
    팔로워: ${(a.follower_count||0).toLocaleString()} · 카테고리: ${a.category}<br>
    채널: <a href="${a.channel_url||'#'}" target="_blank" style="color:var(--bl)">${a.channel_url||'-'}</a><br>
    소개: ${a.introduction||'-'}
  `;
  document.getElementById('appModal').classList.add('open');
}

async function handleApp(action) {
  const body = {
    application_id: document.getElementById('editAppId').value,
    action,
    reason: document.getElementById('rejectReason').value,
  };
  const resp = await api('PUT', '/api/admin/influencers', body);
  if (resp.ok) {
    document.getElementById('appModal').classList.remove('open');
    loadApplications('pending');
  } else {
    alert(resp.error||'처리 실패');
  }
}

// ── 공구 목록 ─────────────────────────────────────────────
async function loadGuguList() {
  const { data } = await sb.from('gugus')
    .select('*, profiles(channel_name, name)')
    .order('created_at', {ascending:false})
    .limit(100);
  const tbody = document.getElementById('gugusTable');
  if (!data?.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--t2);padding:32px">공구 없음</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(g => {
    const pct = g.target_participants>0 ? Math.min(100,Math.round(g.current_participants/g.target_participants*100)) : 0;
    return `<tr>
      <td>${g.emoji||'🛍️'} ${(g.title||'').slice(0,30)}</td>
      <td>${g.profiles?.channel_name||g.profiles?.name||'-'}</td>
      <td>${g.category||'-'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;height:4px;background:var(--b2);border-radius:2px">
            <div style="height:100%;width:${pct}%;background:var(--r);border-radius:2px"></div>
          </div>
          <span style="font-size:11px;color:var(--t2)">${pct}%</span>
        </div>
        <span style="font-size:10px;color:var(--t2)">${g.current_participants}/${g.target_participants}명</span>
      </td>
      <td style="font-size:12px">${(g.sale_price||0).toLocaleString()}원<br><span style="color:var(--t3);text-decoration:line-through">${(g.original_price||0).toLocaleString()}원</span></td>
      <td style="font-size:11px;color:var(--t2)">${g.end_date?.slice(0,10)||'-'}</td>
      <td><span class="badge badge-${g.status==='active'?'paid':g.status==='closed'?'delivered':'cancelled'}">${g.status}</span></td>
    </tr>`;
  }).join('');
}

// ── 공용 API 호출 ─────────────────────────────────────────
async function api(method, url, body) {
  try {
    const opts = {
      method,
      headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${_token}` },
    };
    if (body) opts.body = JSON.stringify(body);
    const resp = await fetch(url, opts);
    return await resp.json();
  } catch(e) {
    return { ok:false, error: e.message };
  }
}

// 모달 바깥 클릭 닫기
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if (e.target===bg) bg.classList.remove('open'); });
});
</script>
