<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GUGU. — 공구 오픈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0A0A;--s1:#111114;--s2:#181818;--b1:#242428;--r:#FF3B3B;--o:#FF8A00;--g:#22c55e;--bl:#6366f1;--t:#F2F2F5;--t2:#8a8a9a;--t3:#464650}
html,body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;font-size:14px;overflow-x:hidden;min-height:100vh}
body{padding-top:52px;padding-bottom:70px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid var(--b1)}
.nb{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:var(--t2)}
.nt{font-size:17px;font-weight:800;flex:1}
.bna{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.97);border-top:1px solid var(--b1);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:#464650;text-decoration:none;font-size:10px;font-weight:600}

.form-wrap{padding:16px}
.form-section{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px;margin-bottom:12px}
.fs-title{font-size:14px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.fs-num{width:22px;height:22px;border-radius:50%;background:var(--r);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fg{margin-bottom:12px}.fg:last-child{margin-bottom:0}
.fg-label{font-size:12px;color:var(--t2);font-weight:600;margin-bottom:5px}
.fg-input,.fg-select,.fg-textarea{width:100%;padding:12px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;color:var(--t);font-size:16px;font-family:inherit;outline:none}
.fg-input:focus,.fg-textarea:focus{border-color:var(--r)}
.fg-input::placeholder,.fg-textarea::placeholder{color:var(--t3)}
.fg-textarea{resize:none;min-height:80px}
.fg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.period-btns{display:flex;gap:7px;flex-wrap:wrap}
.pb{padding:8px 14px;border-radius:8px;border:1px solid var(--b1);background:none;font-size:13px;color:var(--t2);cursor:pointer;font-family:inherit}
.pb.on{border-color:var(--r);color:var(--r);background:rgba(255,59,59,.06)}
.price-preview{background:rgba(255,59,59,.06);border:1px solid rgba(255,59,59,.12);border-radius:10px;padding:12px;margin-top:10px;font-size:12px}
.pp-row{display:flex;justify-content:space-between;margin-bottom:5px;color:var(--t2)}
.pp-row.total{color:var(--g);font-weight:700;font-size:13px}
.submit-btn{width:100%;padding:15px;border-radius:12px;background:var(--r);border:none;color:#fff;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:8px}

</style>
</head>
<body>

<div class="nav"><div class="nb" onclick="history.back()">←</div><div class="nt">공구 오픈하기</div></div>
<div class="form-wrap">
  <div class="form-section">
    <div class="fs-title"><span class="fs-num">1</span>제품 정보</div>
    <div class="fg"><div class="fg-label">제품명 *</div><input class="fg-input" id="pname" type="text" placeholder="제품명 입력" oninput="updatePreview()"></div>
    <div class="fg"><div class="fg-label">카테고리 *</div><select class="fg-select"><option>뷰티</option><option>패션</option><option>푸드&건강</option><option>라이프</option><option>피트니스</option></select></div>
    <div class="fg"><div class="fg-label">제품 설명</div><textarea class="fg-textarea" placeholder="제품 특징과 추천 이유를 입력해주세요"></textarea></div>
  </div>
  <div class="form-section">
    <div class="fs-title"><span class="fs-num">2</span>가격 설정</div>
    <div class="fg-grid">
      <div class="fg"><div class="fg-label">정가 *</div><input class="fg-input" id="orig" type="number" placeholder="0" oninput="calcPrice()"></div>
      <div class="fg"><div class="fg-label">공구가 *</div><input class="fg-input" id="sale" type="number" placeholder="0" oninput="calcPrice()"></div>
    </div>
    <div class="price-preview" id="ppreview" style="display:none">
      <div class="pp-row"><span>정가</span><span id="pp-orig">-</span></div>
      <div class="pp-row"><span>공구가</span><span id="pp-sale">-</span></div>
      <div class="pp-row"><span>할인율</span><span id="pp-disc" style="color:var(--r)">-</span></div>
      <div class="pp-row"><span>GUGU 수수료 (5%)</span><span id="pp-fee" style="color:var(--t3)">-</span></div>
      <div class="pp-row total"><span>인플루언서 수익 (건당)</span><span id="pp-net">-</span></div>
    </div>
  </div>
  <div class="form-section">
    <div class="fs-title"><span class="fs-num">3</span>셀러 & 배송</div>
    <div class="fg"><div class="fg-label">셀러명 *</div><input class="fg-input" type="text" placeholder="셀러 상호명"></div>
    <div class="fg"><div class="fg-label">배송비</div><select class="fg-select"><option>무료배송</option><option>3,000원</option><option>5만원 이상 무료</option></select></div>
    <div class="fg-grid">
      <div class="fg"><div class="fg-label">최소 수량</div><input class="fg-input" type="number" placeholder="1"></div>
      <div class="fg"><div class="fg-label">최대 수량 *</div><input class="fg-input" type="number" placeholder="3"></div>
    </div>
  </div>
  <div class="form-section">
    <div class="fs-title"><span class="fs-num">4</span>공구 기간</div>
    <div class="period-btns">
      <button class="pb" onclick="setPeriod(this)">3일</button>
      <button class="pb on" onclick="setPeriod(this)">5일</button>
      <button class="pb" onclick="setPeriod(this)">7일</button>
      <button class="pb" onclick="setPeriod(this)">직접 입력</button>
    </div>
    <div class="fg" style="margin-top:12px"><div class="fg-label">시작일</div><input class="fg-input" type="date"></div>
    <div class="fg"><div class="fg-label">목표 참여자 수</div><input class="fg-input" type="number" placeholder="5000"></div>
  </div>
  <button class="submit-btn" onclick="alert('공구 신청 완료! 검토 후 오픈할게요 🎉');location.href='influencer-dashboard.html'">공구 오픈 신청하기 →</button>
</div>
<script>
function setPeriod(b){document.querySelectorAll('.pb').forEach(x=>x.classList.remove('on'));b.classList.add('on')}
function calcPrice(){
  const o=Number(document.getElementById('orig').value),s=Number(document.getElementById('sale').value);
  if(o&&s){
    const disc=Math.round((1-s/o)*100),fee=Math.round(s*0.05),net=s-fee;
    document.getElementById('ppreview').style.display='block';
    document.getElementById('pp-orig').textContent=o.toLocaleString()+'원';
    document.getElementById('pp-sale').textContent=s.toLocaleString()+'원';
    document.getElementById('pp-disc').textContent='-'+disc+'%';
    document.getElementById('pp-fee').textContent='-'+fee.toLocaleString()+'원';
    document.getElementById('pp-net').textContent=net.toLocaleString()+'원';
  }
}
</script>
<nav class="bna">
  <a class="bi" href="index.html"><span style="font-size:20px">🏠</span>홈</a>
  <a class="bi" href="category.html"><span style="font-size:20px">🔍</span>탐색</a>
  <a class="bi" href="search.html"><span style="font-size:20px">⌕</span>검색</a>
  <a class="bi" href="notifications.html"><span style="font-size:20px">🔔</span>알림</a>
  <a class="bi" href="mypage.html"><span style="font-size:20px">👤</span>마이</a>
</nav>
</body>
</html>
