<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GUGU. — 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0A0A;--s1:#111114;--s2:#181818;--b1:#242428;--b2:#2e2e34;--r:#FF3B3B;--o:#FF8A00;--g:#22c55e;--bl:#6366f1;--t:#F2F2F5;--t2:#8a8a9a;--t3:#464650}
html,body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;font-size:14px;overflow-x:hidden}
body{padding-top:52px;padding-bottom:66px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid var(--b1)}
.nav-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:var(--t2)}
.nav-title{font-size:17px;font-weight:800;flex:1}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.97);border-top:1px solid var(--b1);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:var(--t3);text-decoration:none;font-size:10px;font-weight:600}
.bn-item.on{color:var(--r)}
.bn-icon{font-size:20px;line-height:1}

.search-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--b1)}
.sb-input{flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:12px 16px;font-size:16px;color:var(--t);font-family:inherit;outline:none}
.sb-input::placeholder{color:var(--t3)}
.sb-input:focus{border-color:var(--r)}
.recent-title{font-size:13px;font-weight:700;color:var(--t2);padding:14px 16px 10px;letter-spacing:1px;text-transform:uppercase;font-size:11px}
.recent-tags{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 16px}
.rtag{padding:8px 14px;border-radius:20px;background:var(--s1);border:1px solid var(--b1);font-size:13px;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:6px}
.rtag:active{background:var(--s2)}
.rtag-del{color:var(--t3);font-size:16px}
.suggest-list{padding:0 16px}
.suggest-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid rgba(36,36,40,.5);cursor:pointer}
.si-icon{font-size:18px;width:36px;height:36px;border-radius:10px;background:var(--s1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.si-text{font-size:14px;font-weight:600;flex:1}
.si-cnt{font-size:12px;color:var(--t2)}

</style>
</head>
<body>
<div class="nav">
  <div class="nav-back" onclick="history.back()">←</div>
  <input class="sb-input" type="search" placeholder="인플루언서, 상품 검색" autofocus id="si" style="flex:1;border:none;border-radius:0;padding:0;background:none;font-size:16px">
  <div style="font-size:13px;color:var(--t2);cursor:pointer" onclick="document.getElementById('si').value=''">취소</div>
</div>
<div style="height:8px"></div>
<div class="recent-title">최근 검색</div>
<div class="recent-tags">
  <div class="rtag">레티날 세럼<div class="rtag-del">×</div></div>
  <div class="rtag">지민뷰티<div class="rtag-del">×</div></div>
  <div class="rtag">웨이프로틴<div class="rtag-del">×</div></div>
  <div class="rtag">닥터자르트<div class="rtag-del">×</div></div>
</div>
<div class="recent-title">인기 검색어</div>
<div class="suggest-list">
  <div class="suggest-item" onclick="location.href='category.html'"><div class="si-icon">💄</div><div class="si-text">레티날 세럼</div><div class="si-cnt">4,812 참여</div></div>
  <div class="suggest-item" onclick="location.href='category.html'"><div class="si-icon">👗</div><div class="si-text">배럴핏 데님</div><div class="si-cnt">3,291 참여</div></div>
  <div class="suggest-item" onclick="location.href='category.html'"><div class="si-icon">💊</div><div class="si-text">콜라겐 스틱</div><div class="si-cnt">2,108 참여</div></div>
  <div class="suggest-item" onclick="location.href='category.html'"><div class="si-icon">🏋️</div><div class="si-text">웨이프로틴</div><div class="si-cnt">5,430 참여</div></div>
  <div class="suggest-item" onclick="location.href='category.html'"><div class="si-icon">🧴</div><div class="si-text">닥터자르트 시카페어</div><div class="si-cnt">1,847 참여</div></div>
</div>

<nav class="bottom-nav">
  <a class="bn-item " href="index.html"><span class="bn-icon">🏠</span>홈</a>
  <a class="bn-item " href="category.html"><span class="bn-icon">🔍</span>탐색</a>
  <a class="bn-item on" href="search.html"><span class="bn-icon">⌕</span>검색</a>
  <a class="bn-item " href="notifications.html"><span class="bn-icon">🔔</span>알림</a>
  <a class="bn-item " href="mypage.html"><span class="bn-icon">👤</span>마이</a>
</nav>
</body>
</html>
