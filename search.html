body{background:var(--bg);color:var(--t1);font-family:'Noto Sans KR','Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.6}a{text-decoration:none;color:inherit}
nav:not(.mob-bottom-nav){position:sticky;top:0;z-index:500;background:rgba(255,255,255,.88);border-bottom:1px solid var(--border);padding:0 24px}
.nav-inner{max-width:1120px;margin:0 auto;display:flex;align-items:center;height:60px;gap:16px}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;text-decoration:none;color:var(--t1)}.logo em{color:var(--red);font-style:normal}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto}.nav-title{font-size:16px;font-weight:700}
.btn{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:.15s}
.btn-outline{background:var(--white);border:1px solid var(--border);color:var(--t1)}.btn-primary{background:var(--red);color:#fff}
.wrap{max-width:1120px;margin:0 auto;padding:32px 24px}
.search-hero{background:var(--white);border-bottom:1px solid var(--border);padding:40px 24px;text-align:center}
.sh-title{font-size:24px;font-weight:800;margin-bottom:16px}
.search-box{max-width:560px;margin:0 auto;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:8px}
.search-box input{background:none;border:none;outline:none;color:var(--t1);font-size:16px;font-family:inherit;width:100%}.search-box input::placeholder{color:var(--t3)}
.trending{max-width:560px;margin:20px auto 0;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.trend-tag{padding:7px 14px;border-radius:99px;border:1px solid var(--border);background:var(--white);font-size:12px;color:var(--t2);cursor:pointer;font-family:inherit}.trend-tag:hover{border-color:var(--border2);color:var(--t1)}
.section-title{font-size:16px;font-weight:700;margin-bottom:16px}
.recent-list{display:flex;flex-direction:column;gap:8px;margin-bottom:32px}
.recent-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--white);border:1px solid var(--border);border-radius:10px;font-size:13px}
.recent-item .q{color:var(--t1)}.recent-item .time{font-size:11px;color:var(--t3)}
.popular-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.pop-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border:1px solid var(--border);border-radius:12px;cursor:pointer}
.pop-rank{font-size:16px;font-weight:800;color:var(--red);width:24px;text-align:center}.pop-rank.low{color:var(--t3)}
.pop-name{font-size:13px;font-weight:600}.pop-meta{font-size:11px;color:var(--t3)}

.mob-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);border-top:1px solid var(--border);z-index:500;justify-content:space-around;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.mbn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;font-size:10px;color:var(--t3);font-weight:600}.mbn-item:hover,.mbn-item.on{color:var(--red)}.mbn-icon{font-size:20px;line-height:1}.mbn-label{font-size:10px}
.mbn-badge{position:absolute;top:-2px;right:-6px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--white)}
@media(max-width:768px){body{padding-bottom:62px}.mob-bottom-nav{display:flex}nav:not(.mob-bottom-nav) .nav-inner{padding:0 16px}.wrap{padding:20px 16px}input,select,textarea{font-size:16px!important}}
