<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GUGU. — 인플루언서 파트너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0A0A;--s1:#111114;--s2:#181818;--b1:#242428;--r:#FF3B3B;--o:#FF8A00;--g:#22c55e;--bl:#6366f1;--t:#F2F2F5;--t2:#8a8a9a;--t3:#464650}
html,body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;font-size:14px;overflow-x:hidden;min-height:100vh}
body{padding-top:52px;padding-bottom:70px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid var(--b1)}
.nb{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:var(--t2)}
.nt{font-size:17px;font-weight:800;flex:1}
.bna{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.97);border-top:1px solid var(--b1);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:#464650;text-decoration:none;font-size:10px;font-weight:600}

.hero{background:linear-gradient(170deg,#160303,#0d0d0d);padding:32px 20px;text-align:center}
.h-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,59,59,.1);border:1px solid rgba(255,59,59,.2);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:700;color:var(--r);margin-bottom:16px}
.h-title{font-family:"Bebas Neue",sans-serif;font-size:42px;letter-spacing:2px;line-height:1;margin-bottom:10px}
.h-title em{color:var(--r);font-style:normal}
.h-sub{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:24px}
.h-cta{display:flex;flex-direction:column;gap:10px}
.h-btn{padding:14px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;border:none}
.h-btn.r{background:var(--r);color:#fff}
.h-btn.o{background:none;border:1px solid var(--b1);color:var(--t2)}
.benefit-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px}
.bcard{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px;text-align:center}
.bc-num{font-size:20px;font-weight:900;color:var(--r);margin-bottom:4px}
.bc-label{font-size:11px;color:var(--t2)}
.section{padding:20px 16px}
.section-title{font-size:20px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
.section-sub{font-size:13px;color:var(--t2);margin-bottom:16px;line-height:1.6}
.process-list{display:flex;flex-direction:column;gap:12px}
.pitem{display:flex;align-items:flex-start;gap:14px;background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px}
.p-num{width:28px;height:28px;border-radius:50%;background:var(--r);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.p-text h4{font-size:14px;font-weight:700;margin-bottom:3px}
.p-text p{font-size:12px;color:var(--t2);line-height:1.5}

</style>
</head>
<body>

<div class="nav"><div class="nb" onclick="history.back()">←</div><div class="nt">인플루언서 파트너</div></div>
<div class="hero">
  <div class="h-badge">✨ 인플루언서 파트너 모집 중</div>
  <div class="h-title">제품만<br>골라오세요<br><em>나머지는 GUGU</em></div>
  <div class="h-sub">정산·CS·페이지 제작 — 공구의 모든 귀찮음을 없애드려요</div>
  <div class="h-cta">
    <button class="h-btn r" onclick="location.href='influencer-apply.html'">지금 신청하기 →</button>
    <button class="h-btn o" onclick="location.href='influencer-dashboard.html'">대시보드 미리보기</button>
  </div>
</div>
<div class="benefit-row">
  <div class="bcard"><div class="bc-num">5%</div><div class="bc-label">수수료만</div></div>
  <div class="bcard"><div class="bc-num">3개월</div><div class="bc-label">수수료 0%</div></div>
  <div class="bcard"><div class="bc-num">0원</div><div class="bc-label">입점비</div></div>
</div>
<div class="section">
  <div class="section-title">어떻게 진행되나요?</div>
  <div class="section-sub">4단계만 따라오세요</div>
  <div class="process-list">
    <div class="pitem"><div class="p-num">1</div><div class="p-text"><h4>셀러 섭외</h4><p>마음에 드는 제품 셀러와 가격 협의</p></div></div>
    <div class="pitem"><div class="p-num">2</div><div class="p-text"><h4>GUGU에 등록</h4><p>정보 입력하면 공구 페이지 자동 생성</p></div></div>
    <div class="pitem"><div class="p-num">3</div><div class="p-text"><h4>SNS 링크 공유</h4><p>팔로워에게 링크만 공유하면 끝</p></div></div>
    <div class="pitem"><div class="p-num">4</div><div class="p-text"><h4>정산 자동 입금</h4><p>마감 후 5 영업일 내 자동 정산</p></div></div>
  </div>
</div>
<div style="padding:16px 20px 24px">
  <button onclick="location.href='influencer-apply.html'" style="width:100%;padding:15px;border-radius:12px;background:var(--r);border:none;color:#fff;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer">파트너 신청하기 →</button>
</div>
<nav class="bna">
  <a class="bi" href="index.html"><span style="font-size:20px">🏠</span>홈</a>
  <a class="bi" href="category.html"><span style="font-size:20px">🔍</span>탐색</a>
  <a class="bi" href="search.html"><span style="font-size:20px">⌕</span>검색</a>
  <a class="bi" href="notifications.html"><span style="font-size:20px">🔔</span>알림</a>
  <a class="bi" href="mypage.html"><span style="font-size:20px">👤</span>마이</a>
</nav>
</body>
</html>
