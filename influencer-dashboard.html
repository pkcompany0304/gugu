<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GUGU. — 인플루언서 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0A0A;--s1:#111114;--s2:#181818;--b1:#242428;--r:#FF3B3B;--o:#FF8A00;--g:#22c55e;--bl:#6366f1;--t:#F2F2F5;--t2:#8a8a9a;--t3:#464650}
html,body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;font-size:14px;overflow-x:hidden;min-height:100vh}
body{padding-top:52px;padding-bottom:70px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid var(--b1)}
.nb{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:var(--t2)}
.nt{font-size:17px;font-weight:800;flex:1}
.bna{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.97);border-top:1px solid var(--b1);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:#464650;text-decoration:none;font-size:10px;font-weight:600}

.wrap{padding:0 16px}
.dash-header{padding:16px 0 12px;display:flex;align-items:center;justify-content:space-between}
.dh-title{font-size:20px;font-weight:900}
.dh-new{padding:9px 16px;border-radius:10px;background:var(--r);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px}
.kc-label{font-size:11px;color:var(--t2);margin-bottom:6px;font-weight:600}
.kc-val{font-size:22px;font-weight:900;letter-spacing:-.5px}
.kc-change{font-size:11px;margin-top:3px}
.kc-change.up{color:var(--g)}.kc-change.down{color:var(--r)}
.sec-title{font-size:15px;font-weight:800;margin-bottom:10px}
.gugu-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.gl-item{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;cursor:pointer}
.gl-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.gl-img{width:48px;height:48px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.gl-info{flex:1}
.gl-name{font-size:13px;font-weight:700;margin-bottom:3px}
.gl-meta{font-size:11px;color:var(--t2)}
.gl-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px}
.status-live{background:rgba(255,59,59,.1);color:var(--r)}
.status-end{background:rgba(100,100,100,.1);color:var(--t2)}
.gl-stats{display:flex;gap:16px}
.gs-item{text-align:center}
.gs-n{font-size:14px;font-weight:800}.gs-l{font-size:10px;color:var(--t2)}
.gl-prog{height:3px;background:var(--b2);border-radius:2px;margin-top:10px}
.gl-fill{height:100%;background:linear-gradient(90deg,var(--r),var(--o));border-radius:2px}

</style>
</head>
<body>

<div class="nav"><div class="nb" onclick="history.back()">←</div><div class="nt">대시보드</div></div>
<div class="wrap">
  <div class="dash-header">
    <div class="dh-title">안녕하세요 👋<br>지민뷰티님</div>
    <button class="dh-new" onclick="location.href='open-gugu.html'">+ 공구 오픈</button>
  </div>
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kc-label">이번 달 수익</div><div class="kc-val" style="color:var(--r)">4.2만원</div><div class="kc-change up">↑ +12% vs 지난달</div></div>
    <div class="kpi-card"><div class="kc-label">총 참여자</div><div class="kc-val">8,103명</div><div class="kc-change up">↑ +341명</div></div>
    <div class="kpi-card"><div class="kc-label">진행 중 공구</div><div class="kc-val">2개</div><div class="kc-change" style="color:var(--t2)">마감 임박 1개</div></div>
    <div class="kpi-card"><div class="kc-label">평균 평점</div><div class="kc-val">4.9⭐</div><div class="kc-change up">↑ 상위 5%</div></div>
  </div>
  <div class="sec-title">진행 중인 공구</div>
  <div class="gugu-list">
    <div class="gl-item" onclick="location.href='product-detail.html'">
      <div class="gl-top">
        <div class="gl-img">🧴</div>
        <div class="gl-info">
          <div class="gl-name">레티날 0.1% 나이트 세럼</div>
          <div class="gl-meta">마감까지 02:14:33 · 40,800원</div>
        </div>
        <div class="gl-status status-live">LIVE</div>
      </div>
      <div class="gl-stats">
        <div class="gs-item"><div class="gs-n">4,812명</div><div class="gs-l">참여</div></div>
        <div class="gs-item"><div class="gs-n">196만원</div><div class="gs-l">예상 수익</div></div>
        <div class="gs-item"><div class="gs-n">82%</div><div class="gs-l">달성률</div></div>
      </div>
      <div class="gl-prog"><div class="gl-fill" style="width:82%"></div></div>
    </div>
    <div class="gl-item" onclick="location.href='product-detail.html'">
      <div class="gl-top">
        <div class="gl-img">💄</div>
        <div class="gl-info">
          <div class="gl-name">롬앤 쥬시래스팅틴트</div>
          <div class="gl-meta">마감까지 5일 · 11,200원</div>
        </div>
        <div class="gl-status status-live">LIVE</div>
      </div>
      <div class="gl-stats">
        <div class="gs-item"><div class="gs-n">3,291명</div><div class="gs-l">참여</div></div>
        <div class="gs-item"><div class="gs-n">17.4만원</div><div class="gs-l">예상 수익</div></div>
        <div class="gs-item"><div class="gs-n">89%</div><div class="gs-l">달성률</div></div>
      </div>
      <div class="gl-prog"><div class="gl-fill" style="width:89%"></div></div>
    </div>
  </div>
</div>
<nav class="bna">
  <a class="bi" href="index.html"><span style="font-size:20px">🏠</span>홈</a>
  <a class="bi" href="category.html"><span style="font-size:20px">🔍</span>탐색</a>
  <a class="bi" href="search.html"><span style="font-size:20px">⌕</span>검색</a>
  <a class="bi" href="notifications.html"><span style="font-size:20px">🔔</span>알림</a>
  <a class="bi" href="mypage.html"><span style="font-size:20px">👤</span>마이</a>
</nav>
</body>
</html>
