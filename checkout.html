<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUGU. — 결제</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F8F8F7;--white:#FFF;--border:#E8E8E8;--border2:#D8D8D8;--red:#EF4444;--red-light:#FEF2F2;--orange:#F97316;--green:#10B981;--green-light:#ECFDF5;--t1:#111;--t2:#6B7280;--t3:#9CA3AF;--r:16px}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans KR','Plus Jakarta Sans',sans-serif;font-size:14px}
a{text-decoration:none;color:inherit}
nav:not(.mob-bottom-nav){background:rgba(255,255,255,.88);border-bottom:1px solid var(--border);padding:0 24px}
.nav-inner{max-width:1120px;margin:0 auto;display:flex;align-items:center;height:60px}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;text-decoration:none;color:var(--t1)}.logo em{color:var(--red);font-style:normal}
.steps{display:flex;align-items:center;gap:0;margin-left:40px}
.step{display:flex;align-items:center;gap:6px;font-size:12px}
.step-c{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.step.done .step-c{background:var(--green);color:#fff}.step.active .step-c{background:var(--red);color:#fff}
.step.idle .step-c{background:var(--bg);color:var(--t3);border:1px solid var(--border)}
.step.active .step-l{color:var(--t1);font-weight:600}.step.idle .step-l{color:var(--t3)}.step.done .step-l{color:var(--green)}
.step-line{width:32px;height:1px;background:var(--border);margin:0 6px}.step-line.done{background:var(--green)}
.wrap{max-width:1120px;margin:0 auto;padding:32px 24px}
.page-title{font-size:22px;font-weight:800;margin-bottom:24px}
.layout{display:grid;grid-template-columns:1fr 380px;gap:28px}
.section{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:16px}
.section-title{font-size:15px;font-weight:700;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;color:var(--t2);font-weight:500}
.form-input{padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--t1);font-size:14px;font-family:inherit;outline:none;transition:.2s}
.form-input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(239,68,68,.08)}.form-input::placeholder{color:var(--t3)}
.addr-btn{padding:11px 16px;border-radius:10px;border:1px solid var(--border);background:var(--white);color:var(--t1);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.pay-methods{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.pay-method{padding:14px 8px;border-radius:12px;border:1px solid var(--border);background:var(--white);cursor:pointer;text-align:center;transition:.2s;font-family:inherit}
.pay-method:hover{border-color:var(--border2)}.pay-method.active{border-color:var(--red);background:var(--red-light)}
.pay-method .pm-icon{font-size:20px;margin-bottom:4px}.pay-method .pm-name{font-size:11px;color:var(--t2)}.pay-method.active .pm-name{color:var(--red)}
.card-inputs{background:var(--bg);border-radius:12px;padding:16px}
.agree-list{display:flex;flex-direction:column;gap:10px}
.agree-item{display:flex;align-items:center;justify-content:space-between}
.agree-left{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer}.agree-left input{accent-color:var(--red)}
.agree-req{font-size:11px;color:var(--red)}.agree-link{font-size:11px;color:var(--t3);cursor:pointer;text-decoration:underline}
.order-summary{position:sticky;top:20px}
.order-product{display:flex;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.order-img{width:68px;height:68px;border-radius:12px;background:linear-gradient(135deg,#FFF1F2,#FEE2E2);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.order-info .name{font-size:14px;font-weight:600;margin-bottom:4px}.order-info .opt{font-size:12px;color:var(--t2);margin-bottom:4px}.order-info .price{font-size:14px;font-weight:700;color:var(--red)}
.price-table{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.price-row{display:flex;justify-content:space-between;font-size:13px}.price-row .k{color:var(--t2)}.price-row .v.green{color:var(--green)}
.price-total{display:flex;justify-content:space-between;font-size:18px;font-weight:800;margin-bottom:20px}.price-total .v{color:var(--red)}
.coupon-row{display:flex;gap:8px;margin-bottom:16px}
.coupon-input{flex:1;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--t1);font-size:13px;font-family:inherit;outline:none}.coupon-input::placeholder{color:var(--t3)}
.coupon-btn{padding:11px 16px;border-radius:10px;border:1px solid var(--border);background:var(--white);color:var(--t1);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.point-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:12px;background:var(--green-light);border-radius:10px;margin-bottom:16px}
.point-row .k{color:var(--t2)}.point-row .v{color:var(--green);font-weight:600}
.btn-pay{width:100%;padding:16px;border-radius:14px;border:none;background:var(--red);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;box-shadow:0 4px 14px rgba(239,68,68,.2)}
.btn-pay:hover{background:#DC2626}
.pay-note{font-size:11px;color:var(--t3);text-align:center;line-height:1.6}
.mob-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);border-top:1px solid var(--border);z-index:500;justify-content:space-around;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.mbn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;font-size:10px;color:var(--t3);font-weight:600}.mbn-item:hover{color:var(--red)}
.mbn-icon{font-size:20px;line-height:1}.mbn-label{font-size:10px}
@media(max-width:768px){
  body{padding-bottom:62px}.mob-bottom-nav{display:flex}
  .wrap{padding:20px 16px}.layout{grid-template-columns:1fr;gap:16px}
  .order-summary{position:static!important;order:-1}
  .form-grid{grid-template-columns:1fr}.pay-methods{grid-template-columns:1fr 1fr}
  .steps{display:none}nav:not(.mob-bottom-nav) .nav-inner{padding:0 16px}
  input,select,textarea{font-size:16px!important}
}
</style>
</head>
<body>
<nav><div class="nav-inner">
  <a class="logo" href="index.html">GUGU<em>.</em></a>
  <div class="steps">
    <div class="step done"><div class="step-c">✓</div><span class="step-l">장바구니</span></div><div class="step-line done"></div>
    <div class="step active"><div class="step-c">2</div><span class="step-l">주문/결제</span></div><div class="step-line"></div>
    <div class="step idle"><div class="step-c">3</div><span class="step-l">완료</span></div>
  </div>
</div></nav>
<div class="wrap">
  <div class="page-title">주문/결제</div>
  <div class="layout">
    <div>
      <div class="section"><div class="section-title">배송지 정보</div><div class="form-grid">
        <div class="form-group"><label class="form-label">받으시는 분</label><input class="form-input" type="text" value="나혜진"></div>
        <div class="form-group"><label class="form-label">휴대폰 번호</label><input class="form-input" type="tel" value="010-1234-5678"></div>
        <div class="form-group full" style="flex-direction:row;align-items:flex-end;gap:8px"><div style="flex:1;display:flex;flex-direction:column;gap:6px"><label class="form-label">주소</label><input class="form-input" type="text" value="서울특별시 강남구 테헤란로 152"></div><button class="addr-btn">주소 검색</button></div>
        <div class="form-group full"><label class="form-label">상세 주소</label><input class="form-input" type="text" placeholder="상세 주소 입력"></div>
        <div class="form-group full"><label class="form-label">배송 요청사항</label><input class="form-input" type="text" placeholder="예: 문 앞에 놔주세요"></div>
      </div></div>
      <div class="section"><div class="section-title">결제 수단</div>
        <div class="pay-methods">
          <button class="pay-method active" onclick="selectPay(this)"><div class="pm-icon">💳</div><div class="pm-name">신용카드</div></button>
          <button class="pay-method" onclick="selectPay(this)"><div class="pm-icon">🟡</div><div class="pm-name">카카오페이</div></button>
          <button class="pay-method" onclick="selectPay(this)"><div class="pm-icon">🟢</div><div class="pm-name">네이버페이</div></button>
          <button class="pay-method" onclick="selectPay(this)"><div class="pm-icon">🏦</div><div class="pm-name">계좌이체</div></button>
        </div>
        <div class="card-inputs"><div class="form-grid">
          <div class="form-group full"><label class="form-label">카드 번호</label><input class="form-input" type="text" placeholder="0000 - 0000 - 0000 - 0000"></div>
          <div class="form-group"><label class="form-label">유효기간</label><input class="form-input" type="text" placeholder="MM / YY"></div>
          <div class="form-group"><label class="form-label">CVC</label><input class="form-input" type="text" placeholder="000"></div>
        </div></div>
      </div>
      <div class="section"><div class="section-title">약관 동의</div><div class="agree-list">
        <div class="agree-item"><label class="agree-left"><input type="checkbox" id="allAgree" onclick="toggleAll(this)"> 전체 동의</label></div>
        <div style="height:1px;background:var(--border);margin:4px 0"></div>
        <div class="agree-item"><label class="agree-left"><input type="checkbox" class="agree-cb"> <span class="agree-req">[필수]</span> 이용약관 동의</label><span class="agree-link">보기</span></div>
        <div class="agree-item"><label class="agree-left"><input type="checkbox" class="agree-cb"> <span class="agree-req">[필수]</span> 개인정보 수집 및 이용 동의</label><span class="agree-link">보기</span></div>
        <div class="agree-item"><label class="agree-left"><input type="checkbox" class="agree-cb"> [선택] 마케팅 정보 수신 동의</label><span class="agree-link">보기</span></div>
      </div></div>
    </div>
    <div class="order-summary"><div class="section">
      <div class="section-title">주문 상품</div>
      <div class="order-product"><div class="order-img">🧴</div><div class="order-info"><div class="name">닥터자르트 시카페어 크림 50ml</div><div class="opt">지민뷰티 공구 · 50ml · 1개</div><div class="price">31,900원</div></div></div>
      <div class="coupon-row"><input class="coupon-input" type="text" placeholder="쿠폰 코드 입력"><button class="coupon-btn">적용</button></div>
      <div class="point-row"><span class="k">적립 포인트</span><span class="v">+319P 적립 예정</span></div>
      <div class="price-table">
        <div class="price-row"><span class="k">상품 금액</span><span class="v">31,900원</span></div>
        <div class="price-row"><span class="k">배송비</span><span class="v green">무료</span></div>
        <div class="price-row"><span class="k">할인</span><span class="v green">-0원</span></div>
      </div>
      <div class="price-total"><span>최종 결제금액</span><span class="v">31,900원</span></div>
      <button class="btn-pay" onclick="location.href='order-complete.html'">31,900원 결제하기</button>
      <div class="pay-note">결제 버튼 클릭 시 이용약관 및<br>개인정보처리방침에 동의하게 됩니다</div>
    </div></div>
  </div>
</div>
<script>
function selectPay(el){document.querySelectorAll('.pay-method').forEach(x=>x.classList.remove('active'));el.classList.add('active')}
function toggleAll(el){document.querySelectorAll('.agree-cb').forEach(c=>c.checked=el.checked)}
</script>
<nav class="mob-bottom-nav">
  <a class="mbn-item" href="index.html"><span class="mbn-icon">🏠</span><span class="mbn-label">홈</span></a>
  <a class="mbn-item" href="category.html"><span class="mbn-icon">🔍</span><span class="mbn-label">탐색</span></a>
  <a class="mbn-item" href="search.html"><span class="mbn-icon">⌕</span><span class="mbn-label">검색</span></a>
  <a class="mbn-item" href="notifications.html"><span class="mbn-icon">🔔</span><span class="mbn-label">알림</span></a>
  <a class="mbn-item" href="mypage.html"><span class="mbn-icon">👤</span><span class="mbn-label">마이</span></a>
</nav>
</body>
</html>
