<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>GUGU. — 결제</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0A0A;--s1:#111114;--s2:#171719;--s3:#1e1e22;
  --b1:#242428;--b2:#2e2e34;
  --r:#FF3B3B;--o:#FF8A00;--g:#22c55e;--bl:#6366f1;
  --t:#F2F2F5;--t2:#8a8a9a;--t3:#464650;
  --max:1100px;
  --text:#F2F2F5;--muted:#8a8a9a;--surface:#111114;
  --surface2:#171719;--border:#242428;--accent:#FF3B3B;
  --accent2:#FF8A00;--green:#22c55e;
}
body{padding-top:56px;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px}
nav{position:fixed;top:0;left:0;right:0;width:100%;z-index:200;background:rgba(10,10,10,.97);border-bottom:1px solid var(--b1,#242428);padding:0 24px}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:56px;gap:12px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;text-decoration:none;color:var(--text)}
.logo span{color:var(--accent)}
.steps{display:flex;align-items:center;gap:0;margin-left:40px}
.step{display:flex;align-items:center;gap:6px;font-size:12px}
.step-c{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.step.done .step-c{background:var(--green);color:#fff}
.step.active .step-c{background:var(--accent);color:#fff}
.step.idle .step-c{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.step.active .step-l{color:var(--text);font-weight:600}
.step.idle .step-l{color:var(--muted)}
.step.done .step-l{color:var(--green)}
.step-line{width:32px;height:1px;background:var(--border);margin:0 4px}
.step-line.done{background:var(--green)}
.wrap{max-width:1100px;margin:0 auto;padding:32px}
.layout{display:grid;grid-template-columns:1fr 360px;gap:28px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px}
.section-title{font-size:15px;font-weight:700;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;color:var(--muted);font-weight:500}
.form-input{padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:.2s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
.form-select{padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;appearance:none;cursor:pointer}
.addr-btn{padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.addr-btn:hover{background:var(--surface2)}
.pay-methods{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.pay-method{padding:12px 8px;border-radius:10px;border:1px solid var(--border);background:none;cursor:pointer;text-align:center;transition:.2s;font-family:inherit}
.pay-method:hover{border-color:var(--muted)}
.pay-method.active{border-color:var(--accent);background:rgba(255,59,59,0.06)}
.pay-method .pm-icon{font-size:20px;margin-bottom:4px}
.pay-method .pm-name{font-size:11px;color:var(--muted)}
.pay-method.active .pm-name{color:var(--accent)}
.card-inputs{background:var(--surface2);border-radius:10px;padding:16px}
.agree-list{display:flex;flex-direction:column;gap:10px}
.agree-item{display:flex;align-items:center;justify-content:space-between}
.agree-left{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer}
.agree-left input{accent-color:var(--accent)}
.agree-req{font-size:11px;color:var(--accent)}
.agree-link{font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline}
/* ORDER SUMMARY */
.order-summary{position:sticky;top:20px}
.order-product{display:flex;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.order-img{width:64px;height:64px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.order-info .name{font-size:14px;font-weight:600;margin-bottom:4px}
.order-info .opt{font-size:12px;color:var(--muted);margin-bottom:4px}
.order-info .price{font-size:14px;font-weight:700;color:var(--accent)}
.price-table{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.price-row{display:flex;justify-content:space-between;font-size:13px}
.price-row .k{color:var(--muted)}
.price-row .v.green{color:var(--green)}
.price-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;margin-bottom:20px}
.price-total .v{color:var(--accent)}
.btn-pay{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px}
.btn-pay:hover{background:#e63535}
.pay-note{font-size:11px;color:var(--muted);text-align:center;line-height:1.6}
.coupon-row{display:flex;gap:8px;margin-bottom:16px}
.coupon-input{flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.coupon-input::placeholder{color:var(--muted)}
.coupon-btn{padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.coupon-btn:hover{background:var(--surface2)}
.point-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:12px;background:var(--surface2);border-radius:8px;margin-bottom:16px}
.point-row .k{color:var(--muted)}
.point-row .v{color:var(--green);font-weight:600}

/* ═══ MOBILE COMMON ═══ */
.mob-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;width:100%;background:rgba(10,10,10,.97);border-top:1px solid var(--b1,#242428);z-index:9999;padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0px)}
.mob-bottom-nav .mbn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;text-decoration:none;color:var(--t2,#8a8a9a);transition:.15s}
.mob-bottom-nav .mbn-item:hover,.mob-bottom-nav .mbn-item.active{color:var(--r,#FF3B3B)}
.mbn-icon{font-size:18px;position:relative}
.mbn-label{font-size:10px;font-weight:600;white-space:nowrap}
.mbn-badge{position:absolute;top:-3px;right:-5px;width:8px;height:8px;border-radius:50%;background:var(--r,#FF3B3B);border:1.5px solid var(--bg,#0A0A0A)}
.mob-menu-btn{display:none;width:36px;height:36px;border-radius:8px;background:var(--s2,#171719);border:1px solid var(--b1,#242428);align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--t2,#8a8a9a);flex-shrink:0}
.mob-drawer{display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.75);align-items:flex-end}
.mob-drawer.open{display:flex}
.mob-drawer-inner{background:var(--s1,#111114);width:100%;border-radius:20px 20px 0 0;padding:20px 20px 40px;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.mob-drawer.open .mob-drawer-inner{transform:translateY(0)}
.mob-drawer-handle{width:36px;height:4px;background:var(--b2,#2e2e34);border-radius:2px;margin:0 auto 20px}
.mob-drawer-cats{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.mob-drawer-cats a{padding:12px 16px;border-radius:10px;font-size:15px;font-weight:600;color:var(--t,#F2F2F5);text-decoration:none;border:1px solid var(--b1,#242428);background:var(--s2,#171719);display:flex;align-items:center;gap:10px}
.mob-drawer-btns{display:flex;gap:8px}
.mob-drawer-btns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.mob-search-bar{display:none;align-items:center;gap:8px;background:var(--s2,#171719);border:1px solid var(--b1,#242428);border-radius:10px;padding:10px 14px;margin:6px 16px 0}
.mob-search-bar input{background:none;border:none;outline:none;color:var(--t,#F2F2F5);font-size:16px;font-family:inherit;width:100%}
@media(max-width:768px){
  .mob-menu-btn{display:flex !important}
  .mob-search-bar{display:flex !important}
  .mob-bottom-nav{display:flex !important}
  body{padding-bottom:64px}
  input,select,textarea{font-size:16px !important}
}

@media(max-width:768px){
  .wrap{padding-left:16px !important;padding-right:16px !important}
  .layout{grid-template-columns:1fr !important;gap:16px !important}
  .order-summary{position:static !important}
  .form-grid{grid-template-columns:1fr !important}
  .pay-methods{grid-template-columns:repeat(2,1fr) !important}
}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="logo" href="index.html">GUGU<span>.</span></a>
    <div class="steps">
      <div class="step done"><div class="step-c">✓</div><span class="step-l">장바구니</span></div>
      <div class="step-line done"></div>
      <div class="step active"><div class="step-c">2</div><span class="step-l">주문/결제</span></div>
      <div class="step-line"></div>
      <div class="step idle"><div class="step-c">3</div><span class="step-l">완료</span></div>
    </div>
  </div>
</nav>
<div class="wrap">
  <div style="font-size:20px;font-weight:700;margin-bottom:24px">주문/결제</div>
  <div class="layout">
    <div>
      <div class="section">
        <div class="section-title">배송지 정보</div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">받으시는 분</label><input class="form-input" type="text" value="나혜진"></div>
          <div class="form-group"><label class="form-label">휴대폰 번호</label><input class="form-input" type="tel" value="010-1234-5678"></div>
          <div class="form-group full" style="flex-direction:row;align-items:flex-end;gap:8px">
            <div style="flex:1;display:flex;flex-direction:column;gap:6px"><label class="form-label">주소</label><input class="form-input" type="text" value="서울특별시 강남구 테헤란로 152" placeholder="주소 검색"></div>
            <button class="addr-btn">주소 검색</button>
          </div>
          <div class="form-group full"><label class="form-label">상세 주소</label><input class="form-input" type="text" placeholder="상세 주소 입력"></div>
          <div class="form-group full"><label class="form-label">배송 요청사항</label><input class="form-input" type="text" placeholder="예: 문 앞에 놔주세요"></div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">결제 수단</div>
        <div class="pay-methods">
          <button class="pay-method active" onclick="selectPay(this)"><div class="pm-icon">💳</div><div class="pm-name">신용카드</div></button>
          <button class="pay-method" onclick="selectPay(this)"><div class="pm-icon">🟡</div><div class="pm-name">카카오페이</div></button>
          <button class="pay-method" onclick="selectPay(this)"><div class="pm-icon">🟢</div><div class="pm-name">네이버페이</div></button>
          <button class="pay-method" onclick="selectPay(this)"><div class="pm-icon">🏦</div><div class="pm-name">계좌이체</div></button>
        </div>
        <div class="card-inputs">
          <div class="form-grid">
            <div class="form-group full"><label class="form-label">카드 번호</label><input class="form-input" type="text" placeholder="0000 - 0000 - 0000 - 0000"></div>
            <div class="form-group"><label class="form-label">유효기간</label><input class="form-input" type="text" placeholder="MM / YY"></div>
            <div class="form-group"><label class="form-label">CVC</label><input class="form-input" type="text" placeholder="000"></div>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">약관 동의</div>
        <div class="agree-list">
          <div class="agree-item">
            <label class="agree-left"><input type="checkbox" id="allAgree" onclick="toggleAll(this)"> 전체 동의</label>
          </div>
          <div style="height:1px;background:var(--border);margin:4px 0"></div>
          <div class="agree-item"><label class="agree-left"><input type="checkbox" class="agree-cb"> <span class="agree-req">[필수]</span> 이용약관 동의</label><span class="agree-link">보기</span></div>
          <div class="agree-item"><label class="agree-left"><input type="checkbox" class="agree-cb"> <span class="agree-req">[필수]</span> 개인정보 수집 및 이용 동의</label><span class="agree-link">보기</span></div>
          <div class="agree-item"><label class="agree-left"><input type="checkbox" class="agree-cb"> [선택] 마케팅 정보 수신 동의</label><span class="agree-link">보기</span></div>
        </div>
      </div>
    </div>
    <div class="order-summary">
      <div class="section">
        <div class="section-title">주문 상품</div>
        <div class="order-product">
          <div class="order-img">🧴</div>
          <div class="order-info">
            <div class="name">닥터자르트 시카페어 크림 50ml</div>
            <div class="opt">지민뷰티 공구 · 50ml · 1개</div>
            <div class="price">31,900원</div>
          </div>
        </div>
        <div class="coupon-row">
          <input class="coupon-input" type="text" placeholder="쿠폰 코드 입력">
          <button class="coupon-btn">적용</button>
        </div>
        <div class="point-row">
          <span class="k">적립 포인트</span>
          <span class="v">+319P 적립 예정</span>
        </div>
        <div class="price-table">
          <div class="price-row"><span class="k">상품 금액</span><span class="v">31,900원</span></div>
          <div class="price-row"><span class="k">배송비</span><span class="v green">무료</span></div>
          <div class="price-row"><span class="k">할인</span><span class="v green">-0원</span></div>
        </div>
        <div class="price-total"><span>최종 결제금액</span><span class="v">31,900원</span></div>
        <button class="btn-pay" onclick="location.href='order-complete.html'">31,900원 결제하기</button>
        <div class="pay-note">결제 버튼 클릭 시 이용약관 및<br>개인정보처리방침에 동의하게 됩니다</div>
      </div>
    </div>
  </div>
</div>
<script>
function selectPay(el){document.querySelectorAll('.pay-method').forEach(x=>x.classList.remove('active'));el.classList.add('active')}
function toggleAll(el){document.querySelectorAll('.agree-cb').forEach(c=>c.checked=el.checked)}
</script>

<!-- 모바일 하단 네비게이션 -->
<nav class="mob-bottom-nav" id="mobBottomNav">
  <a class="mbn-item" href="index.html">
    <span class="mbn-icon">🏠</span>
    <span class="mbn-label">홈</span>
  </a>
  <a class="mbn-item" href="category.html">
    <span class="mbn-icon">🔍</span>
    <span class="mbn-label">탐색</span>
  </a>
  <a class="mbn-item" href="search.html">
    <span class="mbn-icon">⌕</span>
    <span class="mbn-label">검색</span>
  </a>
  <a class="mbn-item" href="notifications.html">
    <span class="mbn-icon" style="position:relative">🔔<span class="mbn-badge"></span></span>
    <span class="mbn-label">알림</span>
  </a>
  <a class="mbn-item" href="mypage.html">
    <span class="mbn-icon">👤</span>
    <span class="mbn-label">마이</span>
  </a>
</nav>

</body>
</html>
