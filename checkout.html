<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUGU. — 결제</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A0A;--s1:#111114;--s2:#171719;--s3:#1e1e22;
  --b1:#242428;--b2:#2e2e34;
  --r:#FF3B3B;--o:#FF8A00;--g:#22c55e;--bl:#6366f1;
  --t:#F2F2F5;--t2:#8a8a9a;--t3:#464650;
  --max:1100px;
}
body{overflow-x:hidden;background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;font-size:14px;padding-top:54px}
nav{background:rgba(10,10,10,0.97);border-bottom:1px solid var(--b1);padding:0 32px}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:56px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;text-decoration:none;color:var(--t)}
.logo span{color:var(--r)}
.steps{display:flex;align-items:center;gap:0;margin-left:40px}
.step{display:flex;align-items:center;gap:6px;font-size:12px}
.step-c{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.step.done .step-c{background:var(--g);color:#fff}
.step.active .step-c{background:var(--r);color:#fff}
.step.idle .step-c{background:var(--s2);color:var(--t2);border:1px solid var(--b1)}
.step.active .step-l{color:var(--t);font-weight:600}
.step.idle .step-l{color:var(--t2)}
.step.done .step-l{color:var(--g)}
.step-line{width:32px;height:1px;background:var(--b1);margin:0 4px}
.step-line.done{background:var(--g)}
.wrap{max-width:1100px;margin:0 auto;padding:32px}
.layout{display:grid;grid-template-columns:1fr 360px;gap:28px}
.section{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:22px;margin-bottom:16px}
.section-title{font-size:15px;font-weight:700;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;color:var(--t2);font-weight:500}
.form-input{padding:10px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t);font-size:14px;font-family:inherit;outline:none;transition:.2s}
.form-input:focus{border-color:var(--r)}
.form-input::placeholder{color:var(--t2)}
.form-select{padding:10px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t);font-size:14px;font-family:inherit;outline:none;appearance:none;cursor:pointer}
.addr-btn{padding:10px 16px;border-radius:8px;border:1px solid var(--b1);background:none;color:var(--t);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.addr-btn:hover{background:var(--s2)}
.pay-methods{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.pay-method{padding:12px 8px;border-radius:10px;border:1px solid var(--b1);background:none;cursor:pointer;text-align:center;transition:.2s;font-family:inherit}
.pay-method:hover{border-color:var(--t2)}
.pay-method.active{border-color:var(--r);background:rgba(255,59,59,0.06)}
.pay-method .pm-icon{font-size:20px;margin-bottom:4px}
.pay-method .pm-name{font-size:11px;color:var(--t2)}
.pay-method.active .pm-name{color:var(--r)}
.card-inputs{background:var(--s2);border-radius:10px;padding:16px}
.agree-list{display:flex;flex-direction:column;gap:10px}
.agree-item{display:flex;align-items:center;justify-content:space-between}
.agree-left{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer}
.agree-left input{accent-color:var(--r)}
.agree-req{font-size:11px;color:var(--r)}
.agree-link{font-size:11px;color:var(--t2);cursor:pointer;text-decoration:underline}
/* ORDER SUMMARY */
.order-summary{position:sticky;top:20px}
.order-product{display:flex;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--b1)}
.order-img{width:64px;height:64px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.order-info .name{font-size:14px;font-weight:600;margin-bottom:4px}
.order-info .opt{font-size:12px;color:var(--t2);margin-bottom:4px}
.order-info .price{font-size:14px;font-weight:700;color:var(--r)}
.price-table{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--b1)}
.price-row{display:flex;justify-content:space-between;font-size:13px}
.price-row .k{color:var(--t2)}
.price-row .v.green{color:var(--g)}
.price-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;margin-bottom:20px}
.price-total .v{color:var(--r)}
.btn-pay{width:100%;padding:14px;border-radius:10px;border:none;background:var(--r);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px}
.btn-pay:hover{background:#e63535}
.pay-note{font-size:11px;color:var(--t2);text-align:center;line-height:1.6}
.coupon-row{display:flex;gap:8px;margin-bottom:16px}
.coupon-input{flex:1;padding:10px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t);font-size:13px;font-family:inherit;outline:none}
.coupon-input::placeholder{color:var(--t2)}
.coupon-btn{padding:10px 16px;border-radius:8px;border:1px solid var(--b1);background:none;color:var(--t);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.coupon-btn:hover{background:var(--s2)}
.point-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:12px;background:var(--s2);border-radius:8px;margin-bottom:16px}
.point-row .k{color:var(--t2)}
.point-row .v{color:var(--g);font-weight:600}

/* 햄버거 드로어 메뉴 */
.mob-menu-btn { display:none; width:36px; height:36px; border-radius:8px; background:var(--s2,#171719); border:1px solid var(--b1,#242428); align-items:center; justify-content:center; cursor:pointer; font-size:18px; color:var(--t2,#8a8a9a); flex-shrink:0; }
.mob-drawer{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.82);align-items:flex-end;}
.mob-drawer.open{display:flex;}
.mob-drawer-inner { background:var(--s1,#111114); width:100%; border-radius:20px 20px 0 0; padding:20px 20px 40px; transform:translateY(100%); transition:transform .3s ease; }
.mob-drawer.open .mob-drawer-inner { transform:translateY(0); }
.mob-drawer-handle { width:36px; height:4px; background:var(--b2,#2e2e34); border-radius:2px; margin:0 auto 20px; }
.mob-drawer-cats { display:flex; flex-direction:column; gap:6px; margin-bottom:20px; }
.mob-drawer-cats a { padding:12px 16px; border-radius:10px; font-size:15px; font-weight:600; color:var(--t,#F2F2F5); text-decoration:none; border:1px solid var(--b1,#242428); background:var(--s2,#171719); display:flex; align-items:center; gap:10px; }
.mob-drawer-btns { display:flex; gap:8px; }
.mob-drawer-btns button { flex:1; padding:12px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
.mob-search-bar { display:none; align-items:center; gap:8px; background:var(--s2,#171719); border:1px solid var(--b1,#242428); border-radius:10px; padding:10px 14px; margin:6px 16px 0; }
.mob-search-bar input { background:none; border:none; outline:none; color:var(--t,#F2F2F5); font-size:14px; font-family:inherit; width:100%; }







@media (max-width:768px){
.wrap { padding-left:16px !important; padding-right:16px !important; }
  .nav-inner { padding-left:16px !important; padding-right:16px !important; }

  .pay-methods { grid-template-columns:repeat(2,1fr) !important; }
  .steps { margin-left:0 !important; overflow-x:auto !important; }

/* 네비 공통 */
  .mob-menu-btn { display:flex !important; }
  .mob-search-bar { display:flex !important; }
  /* 하단 탭바 */
  .mob-bottom-nav { display:flex !important; }
  body { padding-bottom:60px; }
.mob-menu-btn { display:flex !important; }
  .mob-search-bar { display:flex !important; }
.mob-bottom-nav { display: flex !important; }
input, select, textarea { font-size: 16px !important; }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Toss Payments SDK -->
<script src="https://js.tosspayments.com/v1/payment"></script>
<script>
function toggleAll(el){document.querySelectorAll('.agree-cb').forEach(c=>c.checked=el.checked)}

// URL 파라미터
const _qs       = new URLSearchParams(location.search);
const _guguId   = _qs.get('gugu_id');
const _qty      = parseInt(_qs.get('qty') || '1');

// 공구 정보 로드
(async function loadCheckout() {
  if (!_guguId) return;

  // 로그인 확인
  const u = await getCurrentUser();
  if (!u) { location.href = 'login.html?next=checkout.html?gugu_id=' + _guguId + '&qty=' + _qty; return; }

  // 유저 정보 자동 채우기
  if (u.profile?.name)  document.getElementById('shipName').value  = u.profile.name;
  if (u.profile?.phone) document.getElementById('shipPhone').value = u.profile.phone;

  const { data: g } = await sb.from('gugus')
    .select('*, profiles(channel_name, name)')
    .eq('id', _guguId).single();
  if (!g) { alert('상품 정보를 불러올 수 없어요.'); history.back(); return; }

  const total = g.sale_price * _qty;
  const shipping = total >= 50000 ? 0 : 3000;
  const finalAmt = total + shipping;

  // 상품 영역
  document.querySelector('.order-product .order-img').textContent = g.emoji || '🛍️';
  document.querySelector('.order-product .name').textContent = g.title;
  document.querySelector('.order-product .opt').textContent =
    `${g.profiles?.channel_name || g.profiles?.name || ''} 공구 · ${_qty}개`;
  document.querySelector('.order-product .price').textContent =
    `${Number(g.sale_price).toLocaleString()}원 × ${_qty}`;

  // 금액
  document.querySelectorAll('.price-table .price-row')[0].querySelector('.v').textContent =
    `${(g.original_price * _qty).toLocaleString()}원`;
  document.querySelectorAll('.price-table .price-row')[1].querySelector('.v').textContent =
    shipping === 0 ? '무료' : '3,000원';
  document.querySelectorAll('.price-table .price-row')[2].querySelector('.v').textContent =
    `-${((g.original_price - g.sale_price) * _qty).toLocaleString()}원`;
  document.querySelector('.price-total .v').textContent = `${finalAmt.toLocaleString()}원`;
  document.querySelector('.btn-pay').textContent = `${finalAmt.toLocaleString()}원 결제하기`;
  document.querySelector('.btn-pay').dataset.total   = finalAmt;
  document.querySelector('.btn-pay').dataset.guguId  = _guguId;
  document.querySelector('.btn-pay').dataset.qty     = _qty;
  document.querySelector('.btn-pay').dataset.title   = g.title;
})();

async function doPay() {
  const btn = document.querySelector('.btn-pay');

  // 로그인 확인
  const u = await getCurrentUser();
  if (!u) return alert('로그인이 필요합니다');

  // 약관 확인
  const required = document.querySelectorAll('.agree-cb:not(:last-child)');
  for (const cb of required) {
    if (!cb.checked) return alert('필수 약관에 동의해주세요');
  }

  const shipName  = document.getElementById('shipName').value.trim();
  const shipPhone = document.getElementById('shipPhone').value.trim();
  const shipAddr  = document.getElementById('shipAddr').value.trim() + ' ' +
                    document.getElementById('shipAddrDetail').value.trim();
  if (!shipName || !shipPhone || !shipAddr.trim()) {
    return alert('배송지 정보를 모두 입력해주세요.');
  }
  const shipping = { name: shipName, phone: shipPhone, address: shipAddr.trim(), zipcode: '' };

  btn.disabled = true; btn.textContent = '처리 중...';

  // 1. 서버에 주문 초안 생성
  const token = (await sb.auth.getSession()).data.session?.access_token || '';
  const checkoutResp = await fetch('/api/payments/checkout', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: JSON.stringify({
      gugu_id:  btn.dataset.guguId,
      quantity: parseInt(btn.dataset.qty),
      shipping,
    }),
  });
  const checkoutData = await checkoutResp.json();
  if (!checkoutData.ok) {
    btn.disabled = false; btn.textContent = `${parseInt(btn.dataset.total).toLocaleString()}원 결제하기`;
    return alert(checkoutData.error || '주문 생성 실패');
  }

  const { order_id, amount, order_name, customer_name, customer_email, toss_client_key } = checkoutData.data;

  // 2. Toss Payments 결제 요청
  const tossPayments = TossPayments(toss_client_key);
  try {
    await tossPayments.requestPayment('카드', {
      amount,
      orderId:      order_id,
      orderName:    order_name,
      customerName: customer_name,
      customerEmail:customer_email,
      successUrl: window.location.origin + '/order-complete.html',
      failUrl:    window.location.origin + '/checkout.html?gugu_id=' + btn.dataset.guguId + '&qty=' + btn.dataset.qty + '&fail=1',
    });
  } catch (e) {
    btn.disabled = false;
    btn.textContent = `${parseInt(btn.dataset.total).toLocaleString()}원 결제하기`;
    if (e.code !== 'USER_CANCEL') alert(e.message || '결제 실패');
  }
}
</script>
